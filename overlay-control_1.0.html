<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay Controller</title>
    <style>
        @font-face {
            font-family: 'Teko';
            src: url('Teko.ttf') format('truetype');
        }
        
        body {
            font-family: 'Teko', sans-serif;
            font-weight: 600;
            display: flex;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Стили для оверлея */
        .overlay {
            position: relative;
            background-color: transparent;
            flex-grow: 1;
        }
        
        .overlay-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            min-width: 230px;
            width: max-content;
        }
        
        /* Стиль 1 (по умолчанию) - белый текст */
        .style-1.with-bg {
            background-color: rgba(0, 0, 0, 0.8);
        }
        .style-1 .level-text,
        .style-1 .level-number,
        .style-1 .colon { 
            color: #ffb200; /* Оранжевые элементы */
        }
        .style-1 .timer { color: white; }
        .style-1 .respawn-info { color: white; }
        .style-1 .respawn-info .no-despawn { color: #ff4444; }
        
        /* Стиль 2 - чёрный текст */
        .style-2.with-bg {
            background-color: rgba(255, 255, 255, 0.8);
        }
        .style-2 .level-text,
        .style-2 .level-number,
        .style-2 .colon { 
            color: #ffb200; /* Оранжевые элементы */
        }
        .style-2 .timer { color: black; }
        .style-2 .respawn-info { color: black; }
        .style-2 .respawn-info .no-despawn { color: #ff4444; }
        
        .level-line {
            font-size: 32px;
            margin-bottom: 5px;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }
        
        .strength {
            color: #ffb200;
            margin-left: auto;
        }
        
        .timer {
            display: inline;
            font-size: 32px;
        }
        
        .respawn-info {
            font-size: 20px;
            margin-bottom: 10px;
        }

        /* Стили для квадратиков монстров */
        .monsters-squares {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--square-size), 1fr));
            max-width: calc(var(--square-size) * 8 + 70px);
            gap: 10px;
        }

        .monster-square {
            width: var(--square-size);
            height: var(--square-size);
            border-radius: calc(var(--square-size) * 0.2);
            background: black;
            position: relative;
            overflow: visible;
            margin-bottom: 25px;
        }

        .monster-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            filter: drop-shadow(0 0 5px var(--glow-color));
        }

        .monster-square.level-1 { 
            border: 2px solid #4CAF50;
            --glow-color: #4CAF50;
        }
        .monster-square.level-2 { 
            border: 2px solid #2196F3;
            --glow-color: #2196F3;
        }
        .monster-square.level-3 { 
            border: 2px solid #F44336;
            --glow-color: #F44336;
        }

        .monster-count {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 12px;
            font-family: 'Roboto', sans-serif;
            z-index: 1;
        }

        .strength-required {
            position: absolute;
            bottom: -23px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #ffb200;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Roboto', sans-serif;
            white-space: nowrap;
            z-index: 2;
        }

        :root {
            --square-size: 50px;
        }

        
        /* Стили для панели управления */
        .control-panel {
            padding: 20px;
            width: 600px;
            background: #2c3e50;
            box-sizing: border-box;
            color: white;
            overflow-y: auto;
            height: auto;
            position: absolute;
            right: 0;
            top: 0;
            border-radius: 0 0 0 10px;
            font-family: 'Roboto', sans-serif;
            display: flex;
            gap: 20px;
        }

        .control-panel-left,
        .control-panel-right {
            flex: 1;
        }
        
        .control-panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            color: #ecf0f1;
        }

        .monster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .monster-category {
            margin-bottom: 20px;
        }

        .monster-category h3 {
            color: white;
            margin-bottom: 10px;
            padding: 5px;
            border-radius: 4px;
        }

        .category-1 h3 { background: #4CAF50; }
        .category-2 h3 { background: #2196F3; }
        .category-3 h3 { background: #F44336; }

        .monster-icon {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .monster-icon:hover {
            transform: scale(1.1);
        }

        .monster-icon.selected {
            border-color: #ffb200;
            box-shadow: 0 0 10px rgba(255, 178, 0, 0.5);
        }

        .monster-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .monster-icon .count {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 1px 4px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .timer-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .timer-toggle {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        
        button {
            padding: 8px 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            transition: background-color 0.2s;
            flex-grow: 1;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        #startBtn { background-color: #2ecc71; }
        #startBtn:hover { background-color: #27ae60; }
        
        #stopBtn { background-color: #e74c3c; }
        #stopBtn:hover { background-color: #c0392b; }
        
        #resetBtn { background-color: #f39c12; }
        #resetBtn:hover { background-color: #d35400; }
        
        .level-control {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .level-control label {
            font-size: 16px;
        }
        
        input {
            padding: 8px 12px;
            border: 2px solid #3498db;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            background-color: #34495e;
            color: white;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            min-height: 18px;
            margin-top: 4px;
        }
        
        .style-buttons {
            margin-top: 20px;
        }
        
        .style-buttons button {
            background-color: #555;
            margin-bottom: 5px;
        }
        
        /* Тумблер подложки */
        .size-control {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .size-control .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .size-control input[type="range"] {
            flex: 1;
            min-width: 100px;
            max-width: 200px;
            height: 6px;
            background: #3498db;
            border-radius: 3px;
            appearance: none;
            outline: none;
        }

        .size-control input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #2ecc71;
            border-radius: 50%;
            cursor: pointer;
        }

        .size-control #sizeValue {
            min-width: 45px;
            text-align: right;
        }

        .bg-toggle {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            margin-left: 10px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #2ecc71;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Оверлей -->
    <div class="overlay">
        <div class="overlay-container style-1 with-bg" id="overlayContainer">
            <div class="level-line">
                <span class="level-text">УРОВЕНЬ</span> 
                <span class="level-number">1</span>
                <span class="timer" id="timer" style="margin-left: 10px;">00:00</span>
                <span class="strength">💪1</span>
            </div>
            <div class="respawn-info" id="respawnInfo">Респавн: 4-5 минут</div>
            <div class="monsters-squares" id="monstersSquares"></div>
        </div>
    </div>

    <!-- Панель управления -->
    <div class="control-panel">
        <div class="control-panel-left">
            <h2>Управление оверлеем</h2>
            <div class="timer-controls">
                <button id="startBtn">Старт</button>
                <button id="stopBtn">Стоп</button>
                <button id="resetBtn">Сброс</button>
            </div>
            
            <div class="level-control">
                <label for="levelInput">Уровень:</label>
                <input type="number" id="levelInput" min="1" value="1">
                <div id="errorMsg" class="error"></div>
                <button id="setLevelBtn">Установить уровень</button>
                
                <label for="strengthInput">Сила:</label>
                <input type="number" id="strengthInput" min="0" step="1" value="0">
                <div id="strengthErrorMsg" class="error"></div>
                <button id="setStrengthBtn">Установить силу</button>
            </div>
            
            <div class="style-buttons">
                <h3>Стили оверлея:</h3>
                <button id="style1Btn">Стиль 1 (белый текст)</button>
                <button id="style2Btn">Стиль 2 (чёрный текст)</button>
                
                <div class="size-control">
                    <span>Размер квадратиков:</span>
                    <div class="slider-row">
                        <input type="range" id="sizeSlider" min="30" max="60" value="50" step="2">
                        <span id="sizeValue">50px</span>
                    </div>
                </div>

                <div class="bg-toggle">
                    <span>Подложка:</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="bgToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="timer-toggle">
                    <span>Таймер:</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="timerToggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>

        <div class="control-panel-right">
            <h2>Выбор монстров</h2>
            <div id="monsterGrid">
                <div class="monster-category category-1">
                    <h3>Уровень 1</h3>
                    <div class="monster-grid" id="level1Grid"></div>
                </div>
                <div class="monster-category category-2">
                    <h3>Уровень 2</h3>
                    <div class="monster-grid" id="level2Grid"></div>
                </div>
                <div class="monster-category category-3">
                    <h3>Уровень 3</h3>
                    <div class="monster-grid" id="level3Grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let seconds = 0;
        let timerInterval;
        let currentLevel = 1;
        let currentStrength = 0;
        let currentStyle = 1;
        let bgEnabled = true;
        let timerVisible = false;
        let squareSize = 40;
        
        // Данные о монстрах по уровням
        // Конфигурация монстров по уровням
        const monsterConfig = {
            levels: {
                1: { monsters: ['Peeper', 'Shadow Child', 'Gnomes', 'Apex Predator', 'Spewer', 'Bella', 'Birthday Boy', 'Elsa', 'Tick'] },
                2: { monsters: ['Rugrat', 'Animal', 'Upscream', 'Chef', 'Hidden', 'Bowtie', 'Mentalist', 'Banger', 'Gambit', 'Headgrab', 'Heart Hugger', 'Oogly'] },
                3: { monsters: ['Headman', 'Robe', 'Huntsman', 'Reaper', 'Clown', 'Trudge', 'Cleanup Crew', 'Loom'] }
            },
            strength: {
                'Banger': 0,
                'Gnome': 0,
                'Gnomes': 0,
                'Tick': 0,
                'Animal': 4,
                'Birthday Boy': 4,
                'Headgrab': 4,
                'Mentalist': 4,
                'Hidden': 4,
                'Rugrat': 4,
                'Spewer': 4,
                'Upscream': 4,
                'Bowtie': 7,
                'Bella': 9,
                'Chef': 9,
                'Gambit': 9,
                'Heart Hugger': 9,
                'Huntsman': 9,
                'Oogly': 9,
                'Reaper': 9,
                'Shadow Child': 9,
                'Cleanup Crew': 13,
                'Clown': 13,
                'Headman': 13,
                'Loom': 13,
                'Robe': 13,
                'Trudge': 13,
                'Apex Predator': 'impossible',
                'Elsa': 'impossible',
                'Peeper': 'impossible'
            },
            replacements: [
                'Animals', 'Upscreams', 'Bowties', 'Rugrat', 'Mentalists', 'Peepers',
                'Hidden', 'Apex Predators', 'Chefs', 'Spewers', 'Shadow Children',
                'Bangers', 'Gnomes', 'Bella', 'Birthday Boy', 'Elsa', 'Gambit',
                'Headgrab', 'Heart Hugger', 'Oogly', 'Tick'
            ]
        };

        // Конфигурация количества монстров по уровням
        const levelMonsterCounts = {
            '1-2': { level1: 1, level2: 0, level3: 1 },
            '3-5': { level1: 1, level2: 1, level3: 1 },
            '6-8': { level1: 2, level2: 2, level3: 2 },
            '9': { level1: 2, level2: 3, level3: 2 },
            '10-19': { level1: 2, level2: 3, level3: 3 },
            '20+': { level1: 3, level2: 4, level3: 4 }
        };

        // Элементы оверлея
        const levelNumberEl = document.querySelector('.level-number');
        const timerEl = document.getElementById('timer');
        const respawnInfoEl = document.getElementById('respawnInfo');
        const overlayContainer = document.getElementById('overlayContainer');
        const bgToggle = document.getElementById('bgToggle');
        
        // Обработчики кнопок
        document.getElementById('startBtn').addEventListener('click', startTimer);
        document.getElementById('stopBtn').addEventListener('click', stopTimer);
        document.getElementById('resetBtn').addEventListener('click', resetTimer);
        document.getElementById('setLevelBtn').addEventListener('click', setLevel);
        document.getElementById('setStrengthBtn').addEventListener('click', setStrength);
        
        // Обработчики стилей
        document.getElementById('style1Btn').addEventListener('click', () => {
            currentStyle = 1;
            setStyle();
        });
        document.getElementById('style2Btn').addEventListener('click', () => {
            currentStyle = 2;
            setStyle();
        });
        
        // Обработчик тумблера подложки
        bgToggle.addEventListener('change', () => {
            bgEnabled = bgToggle.checked;
            setStyle();
        });

        // Обработчик тумблера таймера
        document.getElementById('timerToggle').addEventListener('change', (e) => {
            timerVisible = e.target.checked;
            timerEl.style.display = timerVisible ? '' : 'none';
            respawnInfoEl.style.display = timerVisible ? '' : 'none';
        });
        
        function setStyle() {
            overlayContainer.className = 'overlay-container';
            overlayContainer.classList.add(`style-${currentStyle}`);
            if (bgEnabled) {
                overlayContainer.classList.add('with-bg');
            }
        }
        
        function startTimer() {
            if (!timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function resetTimer() {
            stopTimer();
            seconds = 0;
            updateDisplay();
        }
        
        function getMonsterCountsForLevel(level) {
            if (level <= 2) return levelMonsterCounts['1-2'];
            if (level <= 5) return levelMonsterCounts['3-5'];
            if (level <= 8) return levelMonsterCounts['6-8'];
            if (level <= 10) return levelMonsterCounts['9-10'];
            return levelMonsterCounts['11+'];
        }

        function createMonsterSquares() {
            const monstersSquares = document.getElementById('monstersSquares');
            monstersSquares.innerHTML = '';
            
            // Добавляем unknown монстров в соответствии с уровнем
            let counts;
            if (currentLevel <= 2) counts = levelMonsterCounts['1-2'];
            else if (currentLevel <= 5) counts = levelMonsterCounts['3-5'];
            else if (currentLevel <= 8) counts = levelMonsterCounts['6-8'];
            else if (currentLevel === 9) counts = levelMonsterCounts['9'];
            else if (currentLevel <= 19) counts = levelMonsterCounts['10-19'];
            else counts = levelMonsterCounts['20+'];
            
            // Создаем unknown монстров для каждого уровня
            for (let level = 1; level <= 3; level++) {
                const count = counts[`level${level}`];
                for (let i = 0; i < count; i++) {
                    const square = document.createElement('div');
                    square.className = `monster-square level-${level}`;
                    
                    const img = document.createElement('img');
                    img.src = 'monsters/unknown.webp';
                    img.alt = 'Unknown Monster';
                    square.appendChild(img);
                    
                    monstersSquares.appendChild(square);
                }
            }
            
            updateMonsterSelects();
        }

        function updateMonsterSelects() {
            // Очищаем все сетки монстров
            document.getElementById('level1Grid').innerHTML = '';
            document.getElementById('level2Grid').innerHTML = '';
            document.getElementById('level3Grid').innerHTML = '';
            
            let currentIndex = 0;
            
            // Создаем иконки для каждого уровня
            for (let level = 1; level <= 3; level++) {
                const grid = document.getElementById(`level${level}Grid`);
                const monsters = monsterConfig.levels[level].monsters;
                
                // Добавляем основных монстров уровня
                monsters.forEach(monster => {
                    const icon = createMonsterIcon(monster, level);
                    grid.appendChild(icon);
                });
                
                // Добавляем замены для 3 уровня
                if (level === 3) {
                    monsterConfig.replacements.forEach(monster => {
                        const icon = createMonsterIcon(monster, level, true);
                        grid.appendChild(icon);
                    });
                }
            }
        }

        function createMonsterIcon(monsterName, level, isReplacement = false) {
            const icon = document.createElement('div');
            icon.className = 'monster-icon';
            icon.dataset.monster = monsterName;
            icon.dataset.level = level;
            
            const img = document.createElement('img');
            let fileName = monsterName.toLowerCase();
            
            // Преобразуем имена файлов
            switch(fileName) {
                case 'peeper': fileName = 'eye_monster'; break;
                case 'shadow child': fileName = 'shadow_child'; break;
                case 'gnomes': fileName = 'gnome'; break;
                case 'apex predator': fileName = 'apex_predator'; break;
                case 'chef': fileName = 'chef_frog'; break;
                case 'clown': fileName = 'clown_beamer'; break;
                case 'animals': fileName = 'animal'; break;
                case 'upscreams': fileName = 'upscream'; break;
                case 'bowties': fileName = 'bowtie'; break;
                case 'mentalists': fileName = 'mentalist'; break;
                case 'peepers': fileName = 'eye_monster'; break;
                case 'chefs': fileName = 'chef_frog'; break;
                case 'spewers': fileName = 'spewer'; break;
                case 'shadow children': fileName = 'shadow_child'; break;
                case 'bangers': fileName = 'banger'; break;
                case 'apex predators': fileName = 'apex_predator'; break;
            }
            
            img.src = `monsters/${fileName}.webp`;
            img.alt = monsterName;
            
            // Добавляем счетчик если нужно
            let count;
            if (monsterName === 'Gnomes' && level !== 3) {
                count = 4;
            } else if ((monsterName === 'Bangers' || monsterName === 'Banger') && level === 2) {
                count = 3;
            } else if (level === 3 && isReplacement) {
                if (['Animals', 'Upscreams', 'Bowties', 'Rugrat', 'Mentalists', 'Peepers', 'Chefs'].includes(monsterName)) {
                    count = 3;
                } else if (['Hidden'].includes(monsterName)) {
                    count = 2;
                } else if (['Apex Predators', 'Spewers', 'Shadow Children'].includes(monsterName)) {
                    count = 4;
                } else if (['Bangers'].includes(monsterName)) {
                    count = 6;
                } else if (['Gnomes'].includes(monsterName)) {
                    count = 10;
                } else if (['Bella', 'Birthday Boy', 'Elsa', 'Headgrab', 'Tick'].includes(monsterName)) {
                    count = 3;
                } else if (['Gambit', 'Heart Hugger', 'Oogly'].includes(monsterName)) {
                    count = 2;
                }
            }
            
            if (count) {
                const countElement = document.createElement('div');
                countElement.className = 'count';
                countElement.textContent = `x${count}`;
                icon.appendChild(countElement);
            }
            
            icon.appendChild(img);
            
            // Добавляем обработчик клика
            icon.addEventListener('click', function() {
                // Находим все квадратики с unknown монстрами текущего уровня
                const unknownSquares = Array.from(document.querySelectorAll(`.monster-square.level-${level}`))
                    .filter(square => square.querySelector('img').src.includes('unknown.webp'));
                
                if (unknownSquares.length === 0) return; // Нет доступных unknown монстров
                
                // Берем первый доступный unknown квадратик
                const square = unknownSquares[0];
                const overlayImg = square.querySelector('img');
                
                // Меняем картинку
                overlayImg.src = img.src;
                overlayImg.alt = monsterName;
                
                // Выделяем текущую иконку
                this.classList.add('selected');
                
                // Добавляем счетчик если нужно
                if (count) {
                    const countElement = document.createElement('div');
                    countElement.className = 'monster-count';
                    countElement.textContent = `x${count}`;
                    square.appendChild(countElement);
                }

                // Добавляем требуемую силу
                let strength;
                if (monsterConfig.strength[monsterName] !== undefined) {
                    strength = monsterConfig.strength[monsterName];
                } else if (monsterName.endsWith('s') && monsterConfig.strength[monsterName.slice(0, -1)] !== undefined) {
                    strength = monsterConfig.strength[monsterName.slice(0, -1)];
                }
                
                const strengthElement = document.createElement('div');
                strengthElement.className = 'strength-required';
                strengthElement.textContent = strength === 'impossible' ? '💪❌' : 
                                            strength === undefined ? '?' :
                                            `💪${strength}`;
                
                // Добавляем цвет в зависимости от текущей силы
                if (strength !== 'impossible' && strength !== undefined) {
                    strengthElement.style.color = currentStrength >= strength ? '#4CAF50' : '#ff4444';
                }
                square.appendChild(strengthElement);
            });

            // Добавляем обработчик правого клика для сброса
            icon.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                
                const squares = document.querySelectorAll('.monster-square.level-' + level);
                let selectedSquare = null;
                
                // Ищем квадратик с этим конкретным монстром
                for (let square of squares) {
                    const squareImg = square.querySelector('img');
                    if (squareImg.src === img.src && squareImg.alt === img.alt) {
                        selectedSquare = square;
                        break;
                    }
                }
                
                if (!selectedSquare) return;
                
                // Убираем выделение с иконки
                this.classList.remove('selected');
                
                // Возвращаем unknown иконку
                const img = selectedSquare.querySelector('img');
                img.src = 'monsters/unknown.webp';
                img.alt = 'Unknown Monster';
                
                // Удаляем счетчик и индикатор силы
                const counter = selectedSquare.querySelector('.monster-count');
                if (counter) counter.remove();
                
                const strength = selectedSquare.querySelector('.strength-required');
                if (strength) strength.remove();
            });
            
            return icon;
        }

        function setLevel() {
            const level = parseInt(document.getElementById('levelInput').value);
            const errorMsg = document.getElementById('errorMsg');
            
            if (isNaN(level) || level < 1) {
                errorMsg.textContent = "Введите число ≥ 1";
                return;
            }
            
            errorMsg.textContent = "";
            currentLevel = level;
            resetTimer(); // Сбрасываем таймер при смене уровня
            updateMonsterInfo();
            createMonsterSquares();
        }

        function setStrength() {
            const strength = parseInt(document.getElementById('strengthInput').value);
            const errorMsg = document.getElementById('strengthErrorMsg');
            
            if (isNaN(strength) || strength < 0) {
                errorMsg.textContent = "Введите неотрицательное число";
                return;
            }
            
            errorMsg.textContent = "";
            currentStrength = strength;
            updateDisplay();
        }
        
        function updateTimer() {
            seconds++;
            updateDisplay();
        }
        
        function updateDisplay() {
            timerEl.textContent = formatTime(seconds);
            updateMonsterInfo();
            updateRespawnInfo();
            
        }
        
        function updateMonsterInfo() {
            levelNumberEl.textContent = currentLevel;
            document.querySelector('.strength').textContent = `💪${currentStrength}`;
            
            // Обновляем цвета всех индикаторов силы
            document.querySelectorAll('.strength-required').forEach(el => {
                const strengthText = el.textContent;
                if (!strengthText.includes('❌') && strengthText !== '?') {
                    const requiredStrength = parseInt(strengthText.replace('💪', ''));
                    el.style.color = currentStrength >= requiredStrength ? '#4CAF50' : '#ff4444';
                }
            });
        }
        
        function updateRespawnInfo() {
            const minutes = Math.floor(seconds / 60);
            let respawnText;
            
            if (minutes < 10) respawnText = "4-5 МИНУТЫ";
            else if (minutes < 20) respawnText = "3.2-4 МИНУТЫ";
            else if (minutes < 30) respawnText = "2.4-3 МИНУТЫ";
            else if (minutes < 40) respawnText = "1.6-2 МИНУТЫ";
            else if (minutes < 50) respawnText = "0.8-1 МИНУТА";
            else respawnText = "1 СЕКУНДА";
            
            const noDespawnText = seconds <= 240 ? ' <span class="no-despawn">(БЕЗ ДЕСПАВНА)</span>' : '';
            respawnInfoEl.innerHTML = `🔄 ${respawnText}${noDespawnText}`;
        }

        function initializeDisplay() {
            timerEl.textContent = "00:00";
            timerEl.style.display = timerVisible ? '' : 'none';
            respawnInfoEl.style.display = timerVisible ? '' : 'none';
            updateMonsterInfo();
            updateRespawnInfo();
            createMonsterSquares();
        }
        
        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Обработчик изменения размера
        document.getElementById('sizeSlider').addEventListener('input', function() {
            const size = this.value;
            document.getElementById('sizeValue').textContent = size + 'px';
            document.documentElement.style.setProperty('--square-size', size + 'px');
        });

        // Инициализация
        initializeDisplay();
    </script>
</body>
</html>
