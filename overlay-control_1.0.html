<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Stream Overlay Controller</title>
    <style>
        @font-face {
            font-family: 'CC Ultimatum';
            src: url('cc-ultimatum-bold.otf') format('opentype');
        }
        
        body {
            font-family: 'CC Ultimatum', sans-serif;
            display: flex;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }
        
        /* Стили для оверлея */
        .overlay {
            position: relative;
            background-color: transparent;
            flex-grow: 1;
        }
        
        .overlay-container {
            position: absolute;
            left: 20px;
            bottom: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            min-width: 230px;
            width: max-content;
        }
        
        /* Стиль 1 (по умолчанию) - белый текст */
        .style-1.with-bg {
            background-color: rgba(0, 0, 0, 0.8);
        }
        .style-1 .level-text,
        .style-1 .level-number,
        .style-1 .colon { 
            color: #ffb200; /* Оранжевые элементы */
        }
        .style-1 .timer { color: white; }
        .style-1 .monsters-info { color: #ff4444; }
        .style-1 .monsters-info.white { color: white; }
        .style-1 .respawn-info { color: white; }
        
        /* Стиль 2 - чёрный текст */
        .style-2.with-bg {
            background-color: rgba(255, 255, 255, 0.8);
        }
        .style-2 .level-text,
        .style-2 .level-number,
        .style-2 .colon { 
            color: #ffb200; /* Оранжевые элементы */
        }
        .style-2 .timer { color: black; }
        .style-2 .monsters-info { color: #ff4444; }
        .style-2 .monsters-info.white { color: black; }
        .style-2 .respawn-info { color: black; }
        
        .level-line {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .timer {
            display: inline;
            font-size: 32px;
        }
        
        .monsters-info {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .respawn-info {
            font-size: 20px;
            margin-bottom: 10px;
        }

        /* Стили для квадратиков монстров */
        .monsters-squares {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .monster-square {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .monster-square img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .monster-square.level-1 { border: 2px solid #4CAF50; }
        .monster-square.level-2 { border: 2px solid #2196F3; }
        .monster-square.level-3 { border: 2px solid #F44336; }
        
        /* Стили для панели управления */
        .control-panel {
            padding: 20px;
            width: 300px;
            background: #2c3e50;
            box-sizing: border-box;
            color: white;
            overflow-y: auto;
            height: auto;
            position: absolute;
            right: 0;
            top: 0;
            border-radius: 0 0 0 10px;
            font-family: 'Roboto', sans-serif;
        }
        
        .control-panel h2 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            color: #ecf0f1;
        }

        .monster-selects {
            margin-top: 20px;
        }

        .monster-select-container {
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .monster-select-container select {
            padding: 8px;
            background-color: #34495e;
            color: white;
            border: 2px solid #3498db;
            border-radius: 4px;
            width: 200px;
        }

        .monster-level-indicator {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: inline-block;
        }

        .monster-level-1 { border: 2px solid #4CAF50; }
        .monster-level-2 { border: 2px solid #2196F3; }
        .monster-level-3 { border: 2px solid #F44336; }
        
        .timer-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 8px 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            transition: background-color 0.2s;
            flex-grow: 1;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        #startBtn { background-color: #2ecc71; }
        #startBtn:hover { background-color: #27ae60; }
        
        #stopBtn { background-color: #e74c3c; }
        #stopBtn:hover { background-color: #c0392b; }
        
        #resetBtn { background-color: #f39c12; }
        #resetBtn:hover { background-color: #d35400; }
        
        .level-control {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        .level-control label {
            font-size: 16px;
        }
        
        input {
            padding: 8px 12px;
            border: 2px solid #3498db;
            border-radius: 4px;
            font-family: 'Roboto', sans-serif;
            font-size: 16px;
            background-color: #34495e;
            color: white;
        }
        
        .error {
            color: #e74c3c;
            font-size: 14px;
            min-height: 18px;
            margin-top: 4px;
        }
        
        .style-buttons {
            margin-top: 20px;
        }
        
        .style-buttons button {
            background-color: #555;
            margin-bottom: 5px;
        }
        
        /* Тумблер подложки */
        .bg-toggle {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
            margin-left: 10px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: #2ecc71;
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Оверлей -->
    <div class="overlay">
        <div class="overlay-container style-1 with-bg" id="overlayContainer">
            <div class="level-line">
                <span class="level-text">Уровень</span> 
                <span class="level-number">1</span><span class="colon">:</span> 
                <span class="timer" id="timer">00:00</span>
            </div>
            <div class="monsters-info" id="monstersInfo">Монстры: 1/0/1</div>
            <div class="respawn-info" id="respawnInfo">Респавн: 4-5 минут</div>
            <div class="monsters-squares" id="monstersSquares"></div>
        </div>
    </div>

    <!-- Панель управления -->
    <div class="control-panel">
        <h2>Управление оверлеем</h2>
        <div class="timer-controls">
            <button id="startBtn">Старт</button>
            <button id="stopBtn">Стоп</button>
            <button id="resetBtn">Сброс</button>
        </div>
        
        <div class="level-control">
            <label for="levelInput">Уровень:</label>
            <input type="number" id="levelInput" min="1" value="1">
            <div id="errorMsg" class="error"></div>
            <button id="setLevelBtn">Установить уровень</button>
        </div>

        <div class="monster-selects" id="monsterSelects">
            <!-- Здесь будут выпадающие списки для выбора монстров -->
        </div>
        
        <div class="style-buttons">
            <h3>Стили оверлея:</h3>
            <button id="style1Btn">Стиль 1 (белый текст)</button>
            <button id="style2Btn">Стиль 2 (чёрный текст)</button>
            
            <div class="bg-toggle">
                <span>Подложка:</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="bgToggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>
    </div>

    <script>
        let seconds = 0;
        let timerInterval;
        let currentLevel = 1;
        let currentStyle = 1;
        let bgEnabled = true;
        
        // Данные о монстрах по уровням
        // Конфигурация монстров по уровням
        const monsterConfig = {
            levels: {
                1: { monsters: ['Peeper', 'Shadow Child', 'Gnomes', 'Apex Predator', 'Spewer'] },
                2: { monsters: ['Rugrat', 'Animal', 'Upscream', 'Chef', 'Hidden', 'Bowtie', 'Mentalist', 'Banger'] },
                3: { monsters: ['Headman', 'Robe', 'Huntsman', 'Reaper', 'Clown', 'Trudge'] }
            },
            replacements: [
                'Animals', 'Upscreams', 'Bowties', 'Rugrat', 'Mentalists', 'Peepers',
                'Hidden', 'Apex Predators', 'Chefs', 'Spewers', 'Shadow Children',
                'Bangers', 'Gnomes'
            ]
        };

        // Конфигурация количества монстров по уровням
        const levelMonsterCounts = {
            '1-2': { level1: 1, level2: 0, level3: 1 },
            '3-5': { level1: 1, level2: 1, level3: 1 },
            '6-8': { level1: 2, level2: 2, level3: 2 },
            '9-10': { level1: 2, level2: 3, level3: 2 },
            '11+': { level1: 2, level2: 3, level3: 3 }
        };

        // Элементы оверлея
        const levelNumberEl = document.querySelector('.level-number');
        const timerEl = document.getElementById('timer');
        const monstersInfoEl = document.getElementById('monstersInfo');
        const respawnInfoEl = document.getElementById('respawnInfo');
        const overlayContainer = document.getElementById('overlayContainer');
        const bgToggle = document.getElementById('bgToggle');
        
        // Обработчики кнопок
        document.getElementById('startBtn').addEventListener('click', startTimer);
        document.getElementById('stopBtn').addEventListener('click', stopTimer);
        document.getElementById('resetBtn').addEventListener('click', resetTimer);
        document.getElementById('setLevelBtn').addEventListener('click', setLevel);
        
        // Обработчики стилей
        document.getElementById('style1Btn').addEventListener('click', () => {
            currentStyle = 1;
            setStyle();
        });
        document.getElementById('style2Btn').addEventListener('click', () => {
            currentStyle = 2;
            setStyle();
        });
        
        // Обработчик тумблера подложки
        bgToggle.addEventListener('change', () => {
            bgEnabled = bgToggle.checked;
            setStyle();
        });
        
        // Горячие клавиши для стилей
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') {
                currentStyle = 1;
                setStyle();
            }
            else if (e.key === '2') {
                currentStyle = 2;
                setStyle();
            }
        });
        
        function setStyle() {
            overlayContainer.className = 'overlay-container';
            overlayContainer.classList.add(`style-${currentStyle}`);
            if (bgEnabled) {
                overlayContainer.classList.add('with-bg');
            }
        }
        
        function startTimer() {
            if (!timerInterval) {
                timerInterval = setInterval(updateTimer, 1000);
            }
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function resetTimer() {
            stopTimer();
            seconds = 0;
            updateDisplay();
        }
        
        function getMonsterCountsForLevel(level) {
            if (level <= 2) return levelMonsterCounts['1-2'];
            if (level <= 5) return levelMonsterCounts['3-5'];
            if (level <= 8) return levelMonsterCounts['6-8'];
            if (level <= 10) return levelMonsterCounts['9-10'];
            return levelMonsterCounts['11+'];
        }

        function createMonsterSquares() {
            const monstersSquares = document.getElementById('monstersSquares');
            monstersSquares.innerHTML = '';
            
            const counts = getMonsterCountsForLevel(currentLevel);
            const totalSquares = counts.level1 + counts.level2 + counts.level3;
            
            for (let i = 0; i < totalSquares; i++) {
                const square = document.createElement('div');
                square.className = 'monster-square';
                
                // Определяем уровень монстра для квадрата
                let monsterLevel;
                if (i < counts.level1) monsterLevel = 1;
                else if (i < counts.level1 + counts.level2) monsterLevel = 2;
                else monsterLevel = 3;
                
                square.classList.add(`level-${monsterLevel}`);
                
                const img = document.createElement('img');
                img.src = 'monsters/unknown.jpg';
                img.alt = '???';
                square.appendChild(img);
                
                monstersSquares.appendChild(square);
            }
            
            updateMonsterSelects(counts);
        }

        function updateMonsterSelects(counts) {
            const selectsContainer = document.getElementById('monsterSelects');
            selectsContainer.innerHTML = '';
            
            let currentIndex = 0;
            
            // Создаем селекты для каждого уровня монстров
            for (let level = 1; level <= 3; level++) {
                const count = level === 1 ? counts.level1 : (level === 2 ? counts.level2 : counts.level3);
                
                for (let i = 0; i < count; i++) {
                    const container = document.createElement('div');
                    container.className = 'monster-select-container';
                    
                    const indicator = document.createElement('div');
                    indicator.className = `monster-level-indicator monster-level-${level}`;
                    
                    const select = document.createElement('select');
                    select.dataset.index = currentIndex++;
                    select.dataset.level = level;
                    
                    // Добавляем опции
                    const defaultOption = document.createElement('option');
                    defaultOption.value = '';
                    defaultOption.textContent = 'Выберите монстра';
                    select.appendChild(defaultOption);
                    
                    // Добавляем монстров соответствующего уровня
                    const monsters = monsterConfig.levels[level].monsters;
                    monsters.forEach(monster => {
                        const option = document.createElement('option');
                        option.value = monster;
                        option.textContent = monster;
                        select.appendChild(option);
                    });
                    
                    // Для монстров 3 уровня добавляем замены
                    if (level === 3) {
                        const replacementsOptgroup = document.createElement('optgroup');
                        replacementsOptgroup.label = 'Замены';
                        monsterConfig.replacements.forEach(monster => {
                            const option = document.createElement('option');
                            option.value = monster;
                            option.textContent = monster;
                            replacementsOptgroup.appendChild(option);
                        });
                        select.appendChild(replacementsOptgroup);
                    }
                    
                    select.addEventListener('change', function() {
                        const squares = document.querySelectorAll('.monster-square');
                        const square = squares[this.dataset.index];
                        const img = square.querySelector('img');
                        
                        if (this.value) {
                            // Преобразуем имена монстров в соответствующие имена файлов
                            let fileName = this.value.toLowerCase();
                            switch(fileName) {
                                // Основные монстры
                                case 'peeper': fileName = 'eye_monster'; break;
                                case 'shadow child': fileName = 'shadow_child'; break;
                                case 'gnomes': fileName = 'gnome'; break;
                                case 'apex predator': fileName = 'apex_predator'; break;
                                case 'chef': fileName = 'chef_frog'; break;
                                case 'clown': fileName = 'clown_beamer'; break;
                                case 'hidden': fileName = 'hidden'; break;
                                
                                // Замены во множественном числе
                                case 'animals': fileName = 'animal'; break;
                                case 'upscreams': fileName = 'upscream'; break;
                                case 'bowties': fileName = 'bowtie'; break;
                                case 'mentalists': fileName = 'mentalist'; break;
                                case 'peepers': fileName = 'eye_monster'; break;
                                case 'chefs': fileName = 'chef_frog'; break;
                                case 'spewers': fileName = 'spewer'; break;
                                case 'shadow children': fileName = 'shadow_child'; break;
                                case 'bangers': fileName = 'banger'; break;
                            }
                            img.src = `monsters/${fileName}.webp`;
                            img.alt = this.value;
                        } else {
                            img.src = 'monsters/eye_monster.webp'; // Используем peeper как placeholder
                            img.alt = '???';
                        }
                    });
                    
                    container.appendChild(indicator);
                    container.appendChild(select);
                    selectsContainer.appendChild(container);
                }
            }
        }

        function setLevel() {
            const level = parseInt(document.getElementById('levelInput').value);
            const errorMsg = document.getElementById('errorMsg');
            
            if (isNaN(level) || level < 1) {
                errorMsg.textContent = "Введите число ≥ 1";
                return;
            }
            
            errorMsg.textContent = "";
            currentLevel = level;
            updateMonsterInfo();
            createMonsterSquares();
        }
        
        function updateTimer() {
            seconds++;
            updateDisplay();
        }
        
        function updateDisplay() {
            timerEl.textContent = formatTime(seconds);
            updateMonsterInfo();
            updateRespawnInfo();
            
            // Изменение цвета текста после 4 минут (240 секунд)
            if (seconds > 240) {
                monstersInfoEl.classList.add('white');
            } else {
                monstersInfoEl.classList.remove('white');
            }
        }
        
        function updateMonsterInfo() {
            let lvl1, lvl2, lvl3;
            
            if (currentLevel <= 2) {
                lvl1 = 1; lvl2 = 0; lvl3 = 1;
            } else if (currentLevel <= 5) {
                lvl1 = 1; lvl2 = 1; lvl3 = 1;
            } else if (currentLevel <= 8) {
                lvl1 = 2; lvl2 = 2; lvl3 = 2;
            } else if (currentLevel <= 10) {
                lvl1 = 2; lvl2 = 3; lvl3 = 2;
            } else {
                lvl1 = 2; lvl2 = 3; lvl3 = 3;
            }
            
            levelNumberEl.textContent = currentLevel;
            monstersInfoEl.textContent = `Монстры: ${lvl1}/${lvl2}/${lvl3}`;
        }
        
        function updateRespawnInfo() {
            const minutes = Math.floor(seconds / 60);
            let respawnText;
            
            if (minutes < 10) respawnText = "4-5 минут";
            else if (minutes < 20) respawnText = "3.2-4 минут";
            else if (minutes < 30) respawnText = "2.4-3 минут";
            else if (minutes < 40) respawnText = "1.6-2 минут";
            else if (minutes < 50) respawnText = "0.8-1 минута";
            else respawnText = "1 секунда";
            
            respawnInfoEl.textContent = `Респавн: ${respawnText}`;
        }
        
        function formatTime(totalSeconds) {
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        // Инициализация
        updateMonsterInfo();
    </script>
</body>
</html>
