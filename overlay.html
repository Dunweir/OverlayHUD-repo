<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay</title>
    <link rel="stylesheet" href="overlay.css">
</head>
<body class="overlay-page">
    <div class="overlay">
        <div class="overlay-hover-controls" id="overlayHoverControls">
            <div class="overlay-control-panel">
                <div class="overlay-slider-row">
                    <label for="overlaySizeSlider">Размер</label>
                    <input type="range" id="overlaySizeSlider" min="40" max="86" value="64" step="2">
                    <span id="overlaySizeValue">64</span>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlayUpgradeSizeSlider">Апгрейды</label>
                    <input type="range" id="overlayUpgradeSizeSlider" min="24" max="54" value="32" step="2">
                    <span id="overlayUpgradeSizeValue">32</span>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlayColumnsSlider">Колонки</label>
                    <input type="range" id="overlayColumnsSlider" min="4" max="12" value="7" step="1">
                    <span id="overlayColumnsValue">7</span>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlayHoverOpacitySlider">Прозрачность</label>
                    <input type="range" id="overlayHoverOpacitySlider" min="20" max="100" value="50" step="5">
                    <span id="overlayHoverOpacityValue">50%</span>
                </div>
                <div class="overlay-toggle-list">
                    <label class="overlay-toggle-row">
                        <span>Подложка</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayBgToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>Таймер</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayTimerToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>Апгрейды</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayUpgradesToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>Подсказки</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayUpgradeTooltipsToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>ХП полоска</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayMonsterHealthBarsToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>Сила</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayMonsterStrengthToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>Время респавна</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayRespawnTimerToggle">
                            <span></span>
                        </span>
                    </label>
                    <label class="overlay-toggle-row">
                        <span>Индикатор КД</span>
                        <span class="overlay-toggle-switch">
                            <input type="checkbox" id="overlayRespawnIndicatorToggle">
                            <span></span>
                        </span>
                    </label>
                </div>
            </div>
            <div class="overlay-control-hotspot" id="overlayControlHotspot" aria-hidden="true"></div>
        </div>
        <div class="overlay-container" id="overlayContainer">
            <div class="overlay-header">
                <div class="level-badge">
                    <span class="level-text">УРОВЕНЬ</span>
                    <span class="level-number" id="levelNumber">1</span>
                </div>
                <div class="overlay-meta">
                    <span class="timer" id="timer">00:00</span>
                </div>
            </div>
            <div class="upgrade-row" id="upgradeRow" aria-label="Player upgrades"></div>
            <div class="monsters-squares" id="monstersSquares"></div>
        </div>
    </div>

    <script src="overlay-state.js"></script>
    <script>
        const overlayContainer = document.getElementById("overlayContainer");
        const overlayHoverControls = document.getElementById("overlayHoverControls");
        const levelNumber = document.getElementById("levelNumber");
        const timer = document.getElementById("timer");
        const upgradeRow = document.getElementById("upgradeRow");
        const monstersSquares = document.getElementById("monstersSquares");
        const overlaySizeSlider = document.getElementById("overlaySizeSlider");
        const overlaySizeValue = document.getElementById("overlaySizeValue");
        const overlayUpgradeSizeSlider = document.getElementById("overlayUpgradeSizeSlider");
        const overlayUpgradeSizeValue = document.getElementById("overlayUpgradeSizeValue");
        const overlayColumnsSlider = document.getElementById("overlayColumnsSlider");
        const overlayColumnsValue = document.getElementById("overlayColumnsValue");
        const overlayHoverOpacitySlider = document.getElementById("overlayHoverOpacitySlider");
        const overlayHoverOpacityValue = document.getElementById("overlayHoverOpacityValue");
        const overlayBgToggle = document.getElementById("overlayBgToggle");
        const overlayTimerToggle = document.getElementById("overlayTimerToggle");
        const overlayUpgradesToggle = document.getElementById("overlayUpgradesToggle");
        const overlayUpgradeTooltipsToggle = document.getElementById("overlayUpgradeTooltipsToggle");
        const overlayMonsterHealthBarsToggle = document.getElementById("overlayMonsterHealthBarsToggle");
        const overlayMonsterStrengthToggle = document.getElementById("overlayMonsterStrengthToggle");
        const overlayRespawnTimerToggle = document.getElementById("overlayRespawnTimerToggle");
        const overlayRespawnIndicatorToggle = document.getElementById("overlayRespawnIndicatorToggle");
        let latestState = null;
        let renderedSquareCount = 0;
        let lastTimerText = "";
        const monsterImageLoads = new Map();
        const upgradeElements = new Map();
        const viewportScale = {
            baseWidth: 1920,
            baseHeight: 1080,
            min: 0.45,
            max: 1.5,
            edgeOffset: 20
        };
        const upgradeDefinitions = [
            { key: "strength", name: "Strength", image: "upgrades/Strength_Upgrade.webp", color: "#ff9a3d", background: "rgba(255, 106, 22, 0.2)" },
            { key: "tumbleLaunch", name: "Tumble Launch", image: "upgrades/Tumble_Launch_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" },
            { key: "range", name: "Range", image: "upgrades/Range_Upgrade.webp", color: "#ff9a3d", background: "rgba(255, 106, 22, 0.2)" },
            { key: "sprintSpeed", name: "Sprint Speed", image: "upgrades/Sprint_Speed_Upgrade.webp", color: "#ffe05a", background: "rgba(229, 179, 16, 0.2)" },
            { key: "mapPlayerCount", name: "Map Player Count", image: "upgrades/Upgrade_Map-Player-Count_Albedo.webp", color: "#65e887", background: "rgba(29, 165, 73, 0.2)" },
            { key: "tumbleWings", name: "Tumble Wings", image: "upgrades/Tumble_Wings_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" },
            { key: "crouchRest", name: "Crouch Rest", image: "upgrades/Crouch_Rest_Upgrade.webp", color: "#ffe05a", background: "rgba(229, 179, 16, 0.2)" },
            { key: "extraJump", name: "Extra Jump", image: "upgrades/Extra_Jump_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" },
            { key: "tumbleClimb", name: "Tumble Climb", image: "upgrades/Tumble_Climb_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" }
        ];

        function applyViewportScale() {
            const baseScale = Math.min(
                window.innerWidth / viewportScale.baseWidth,
                window.innerHeight / viewportScale.baseHeight
            );
            const sizingState = latestState || { squareSize: 70, columnsCount: 7 };
            const squareSize = Number(sizingState.squareSize) || 64;
            const columnsCount = Number(sizingState.columnsCount) || 7;
            const gridWidth = columnsCount * squareSize + Math.max(0, columnsCount - 1) * 10;
            const containerWidth = Math.max(310, gridWidth + 30);
            const fitScale = (window.innerWidth - viewportScale.edgeOffset * 2) / containerWidth;
            const scale = Math.min(baseScale, fitScale);
            const clampedScale = Math.min(viewportScale.max, Math.max(viewportScale.min, scale));
            const availableWidth = Math.max(240, (window.innerWidth - viewportScale.edgeOffset * 2) / clampedScale);

            document.documentElement.style.setProperty("--viewport-scale", clampedScale.toFixed(4));
            document.documentElement.style.setProperty("--overlay-edge-offset", `${viewportScale.edgeOffset}px`);
            document.documentElement.style.setProperty("--overlay-available-width", `${availableWidth}px`);
        }

        function buildUpgradeRow() {
            for (const upgrade of upgradeDefinitions) {
                const badge = document.createElement("div");
                badge.className = "upgrade-stat";
                badge.dataset.upgradeName = upgrade.name;
                badge.style.setProperty("--upgrade-color", upgrade.color);
                badge.style.setProperty("--upgrade-background", upgrade.background);

                const img = document.createElement("img");
                img.src = upgrade.image;
                img.alt = upgrade.name;
                badge.appendChild(img);

                const value = document.createElement("span");
                value.textContent = "0";
                badge.appendChild(value);

                const tooltip = document.createElement("span");
                tooltip.className = "upgrade-tooltip";
                tooltip.textContent = upgrade.name;
                badge.appendChild(tooltip);

                upgradeElements.set(upgrade.key, { badge, value });
                upgradeRow.appendChild(badge);
            }
        }

        function preloadMonsterImage(src) {
            if (!monsterImageLoads.has(src)) {
                monsterImageLoads.set(src, new Promise((resolve) => {
                    const preload = new Image();
                    let finished = false;
                    const finish = () => {
                        if (finished) return;
                        finished = true;
                        if (typeof preload.decode === "function") {
                            preload.decode().catch(() => {}).finally(() => resolve(src));
                        } else {
                            resolve(src);
                        }
                    };
                    preload.onload = finish;
                    preload.onerror = () => resolve(src);
                    preload.src = src;
                    if (preload.complete) finish();
                }));
            }
            return monsterImageLoads.get(src);
        }

        function clearSquare(square) {
            square.dataset.monsterKey = "";
            square.dataset.imagePending = "";
            square.dataset.monsterHealthKey = "";
            square.dataset.monsterHealthValue = "";
            square.classList.remove("is-revealing");
            square.classList.remove("is-damaged");
            clearMonsterCooldown(square);
            square.querySelectorAll(".monster-reveal-image, .monster-damage-pop").forEach((element) => element.remove());
            const img = square.firstElementChild;
            if (!img.src.includes("monsters/unknown.webp")) {
                img.src = "monsters/unknown.webp";
            }
            if (img.alt !== "Unknown Monster") {
                img.alt = "Unknown Monster";
            }
            square.removeAttribute("title");
            square.querySelectorAll(".monster-count, .strength-required, .monster-tooltip, .monster-health-bar").forEach((element) => element.remove());
        }

        function getMonsterStrengthText(monster) {
            if (!monster || monster.strength === undefined) return "Сила: ?";
            if (monster.strength === "impossible") return "Сила: нельзя поднять";
            return `Сила: ${monster.strength}`;
        }

        function getMonsterHealthText(status) {
            const health = Number(status?.health);
            const maxHealth = Number(status?.maxHealth);
            if (!Number.isFinite(health)) return "ХП: ?";
            if (!Number.isFinite(maxHealth) || maxHealth <= 0) return `ХП: ${Math.ceil(health)} / ?`;
            return `ХП: ${Math.ceil(health)} / ${Math.ceil(maxHealth)}`;
        }

        function updateMonsterHealthBar(square, status) {
            let bar = square.querySelector(".monster-health-bar");
            if (!bar) {
                bar = document.createElement("div");
                bar.className = "monster-health-bar";
                bar.innerHTML = '<span class="monster-health-fill"></span>';
                square.appendChild(bar);
            }

            const health = Number(status?.health);
            const maxHealth = Number(status?.maxHealth);
            const hasHealth = Number.isFinite(health) && Number.isFinite(maxHealth) && maxHealth > 0;
            bar.classList.toggle("is-hidden", !hasHealth);
            if (!hasHealth) return;

            const ratio = Math.min(1, Math.max(0, health / maxHealth));
            bar.style.setProperty("--monster-health-ratio", `${Math.round(ratio * 1000) / 10}%`);
            bar.classList.toggle("is-warning", ratio > 0.3 && ratio <= 0.6);
            bar.classList.toggle("is-low", ratio > 0.1 && ratio <= 0.3);
            bar.classList.toggle("is-critical", ratio > 0 && ratio <= 0.1);
            bar.classList.toggle("is-empty", ratio <= 0);
        }

        function updateMonsterDamageFeedback(square, status, monsterKey) {
            const health = Number(status?.health);
            if (!Number.isFinite(health)) {
                square.dataset.monsterHealthKey = monsterKey;
                square.dataset.monsterHealthValue = "";
                return;
            }

            const previousKey = square.dataset.monsterHealthKey;
            const previousHealth = Number(square.dataset.monsterHealthValue);
            square.dataset.monsterHealthKey = monsterKey;
            square.dataset.monsterHealthValue = String(health);

            if (previousKey !== monsterKey || !Number.isFinite(previousHealth) || health >= previousHealth) return;

            const damage = Math.max(1, Math.ceil(previousHealth - health));
            square.classList.remove("is-damaged");
            void square.offsetWidth;
            square.classList.add("is-damaged");
            setTimeout(() => {
                if (square.dataset.monsterHealthKey === monsterKey) square.classList.remove("is-damaged");
            }, 1020);

            const damagePop = document.createElement("div");
            damagePop.className = "monster-damage-pop";
            damagePop.textContent = `-${damage} HP`;
            square.appendChild(damagePop);
            setTimeout(() => damagePop.remove(), 1120);
        }

        function updateMonsterTooltip(square, monster, status) {
            let tooltip = square.querySelector(".monster-tooltip");
            if (!tooltip) {
                tooltip = document.createElement("div");
                tooltip.className = "monster-tooltip";
                tooltip.innerHTML = '<span class="monster-tooltip-name"></span><span class="monster-tooltip-health"></span><span class="monster-tooltip-strength"></span>';
                square.appendChild(tooltip);
            }

            tooltip.querySelector(".monster-tooltip-name").textContent = monster.name;
            tooltip.querySelector(".monster-tooltip-health").textContent = getMonsterHealthText(status);
            tooltip.querySelector(".monster-tooltip-strength").textContent = getMonsterStrengthText(monster);
        }

        function clearMonsterCooldown(square) {
            square.classList.remove("is-on-cooldown");
            square.dataset.cooldownActive = "false";
            square.dataset.respawnEndsAt = "";
            square.dataset.respawnDuration = "";
            const time = square.querySelector(".monster-cooldown-time");
            if (time) time.textContent = "";
        }

        function configureMonsterCooldown(square, status) {
            if (!status || status.alive !== false) {
                clearMonsterCooldown(square);
                return;
            }

            square.dataset.cooldownActive = "true";
            square.dataset.respawnEndsAt = status.respawnEndsAt == null ? "" : String(status.respawnEndsAt);
            square.dataset.respawnDuration = status.respawnDuration == null ? "" : String(status.respawnDuration);
            renderMonsterCooldown(square);
        }

        function renderMonsterCooldown(square) {
            if (square.dataset.cooldownActive !== "true") return;
            const cooldown = square.querySelector(".monster-cooldown");
            const time = square.querySelector(".monster-cooldown-time");
            const endsAt = Number(square.dataset.respawnEndsAt);
            const duration = Number(square.dataset.respawnDuration);

            square.classList.add("is-on-cooldown");
            if (!Number.isFinite(endsAt) || endsAt <= 0 || !Number.isFinite(duration) || duration <= 0) {
                cooldown.style.setProperty("--cooldown-angle", "0deg");
                time.textContent = "КД";
                return;
            }

            const remaining = Math.max(0, (endsAt - Date.now()) / 1000);
            if (remaining <= 0) {
                clearMonsterCooldown(square);
                return;
            }

            const elapsed = Math.min(1, Math.max(0, 1 - remaining / duration));
            cooldown.style.setProperty("--cooldown-angle", `${elapsed * 360}deg`);
            const seconds = Math.ceil(remaining);
            time.textContent = `${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`;
        }

        function updateMonsterSquare(square, level, monster, currentStrength, status = null) {
            square.classList.remove("level-1", "level-2", "level-3");
            square.classList.add(`level-${level}`);

            if (!monster) {
                clearSquare(square);
                return;
            }

            const img = square.firstElementChild;
            const monsterKey = String(monster.id || monster.name);
            const shouldReveal = square.dataset.monsterKey !== monsterKey;
            square.dataset.monsterKey = monsterKey;
            if (shouldReveal) square.dataset.imagePending = monster.image;
            configureMonsterCooldown(square, status);

            let count = square.querySelector(".monster-count");
            if (!monster.count && count) {
                count.remove();
            }

            if (monster.count) {
                if (!count) {
                    count = document.createElement("div");
                    count.className = "monster-count";
                    square.appendChild(count);
                }
                count.textContent = `x${monster.count}`;
            }

            let required = square.querySelector(".strength-required");
            if (!required) {
                required = document.createElement("div");
                required.className = "strength-required";
                square.appendChild(required);
            }

            if (monster.strength === "impossible") {
                required.textContent = "💪X";
                required.style.color = "";
            } else if (monster.strength === undefined) {
                required.textContent = "?";
                required.style.color = "";
            } else {
                required.textContent = `💪${monster.strength}`;
                required.style.color = currentStrength >= monster.strength ? "#4CAF50" : "#ff4444";
            }

            updateMonsterTooltip(square, monster, status);
            updateMonsterHealthBar(square, status);
            updateMonsterDamageFeedback(square, status, monsterKey);

            if (shouldReveal) {
                preloadMonsterImage(monster.image).then(() => {
                    if (square.dataset.monsterKey !== monsterKey) return;
                    square.querySelectorAll(".monster-reveal-image").forEach((element) => element.remove());

                    const revealImage = document.createElement("img");
                    revealImage.className = "monster-reveal-image";
                    revealImage.src = monster.image;
                    revealImage.alt = monster.name;
                    square.appendChild(revealImage);

                    square.classList.remove("is-revealing");
                    requestAnimationFrame(() => {
                        if (square.dataset.monsterKey === monsterKey) square.classList.add("is-revealing");
                    });

                    let finalized = false;
                    const finalizeReveal = () => {
                        if (finalized) return;
                        finalized = true;
                        if (square.dataset.monsterKey === monsterKey) {
                            img.src = monster.image;
                            img.alt = monster.name;
                            square.dataset.imagePending = "";
                        }
                        revealImage.remove();
                        if (!square.querySelector(".monster-reveal-image")) square.classList.remove("is-revealing");
                    };
                    revealImage.addEventListener("animationend", finalizeReveal, { once: true });
                    setTimeout(finalizeReveal, 900);
                });
            } else if (square.dataset.imagePending !== monster.image && !img.src.includes(monster.image)) {
                img.src = monster.image;
                img.alt = monster.name;
            }
        }

        function ensureMonsterSquares(totalCount) {
            while (renderedSquareCount < totalCount) {
                const square = document.createElement("div");
                square.className = "monster-square level-1 is-slot-entering";

                const img = document.createElement("img");
                img.className = "monster-base-image";
                img.src = "monsters/unknown.webp";
                img.alt = "Unknown Monster";
                square.appendChild(img);

                const cooldown = document.createElement("div");
                cooldown.className = "monster-cooldown";
                const cooldownTime = document.createElement("span");
                cooldownTime.className = "monster-cooldown-time";
                cooldown.appendChild(cooldownTime);
                square.appendChild(cooldown);

                monstersSquares.appendChild(square);
                renderedSquareCount++;
            }

            while (renderedSquareCount > totalCount) {
                monstersSquares.lastElementChild.remove();
                renderedSquareCount--;
            }
        }

        function renderTimer(state) {
            const seconds = OverlayApp.getTimerSeconds(state);
            const timerText = OverlayApp.formatTime(seconds);
            if (timerText !== lastTimerText) {
                timer.textContent = timerText;
                lastTimerText = timerText;
            }
        }

        function render(state) {
            latestState = state;
            document.documentElement.style.setProperty("--square-size", `${state.squareSize}px`);
            document.documentElement.style.setProperty("--upgrade-size", `${state.upgradeSize}px`);
            document.documentElement.style.setProperty("--columns-count", state.columnsCount);
            applyViewportScale();
            overlaySizeSlider.value = state.squareSize;
            overlaySizeValue.textContent = state.squareSize;
            overlayUpgradeSizeSlider.value = state.upgradeSize;
            overlayUpgradeSizeValue.textContent = state.upgradeSize;
            overlayColumnsSlider.value = state.columnsCount;
            overlayColumnsValue.textContent = state.columnsCount;
            overlayHoverOpacitySlider.value = state.hoverOpacity;
            overlayHoverOpacityValue.textContent = `${state.hoverOpacity}%`;
            overlayHoverControls.dataset.hoverOpacity = state.hoverOpacity;
            overlayBgToggle.checked = state.bgEnabled;
            overlayTimerToggle.checked = state.timerVisible;
            overlayUpgradesToggle.checked = state.upgradesVisible;
            overlayUpgradeTooltipsToggle.checked = state.upgradeTooltipsVisible;
            overlayMonsterHealthBarsToggle.checked = state.monsterHealthBarsVisible;
            overlayMonsterStrengthToggle.checked = state.monsterStrengthVisible;
            overlayRespawnTimerToggle.checked = state.respawnTimerVisible;
            overlayRespawnIndicatorToggle.checked = state.respawnIndicatorVisible;

            overlayContainer.className = "overlay-container";
            if (state.bgEnabled) overlayContainer.classList.add("with-bg");
            if (!state.timerVisible) overlayContainer.classList.add("hide-level-timer");
            if (!state.upgradesVisible) overlayContainer.classList.add("hide-upgrades");
            if (!state.upgradeTooltipsVisible) overlayContainer.classList.add("hide-upgrade-tooltips");
            if (!state.upgradeTooltipsVisible) overlayContainer.classList.add("hide-tooltips");
            if (!state.monsterHealthBarsVisible) overlayContainer.classList.add("hide-monster-health-bars");
            if (!state.monsterStrengthVisible) overlayContainer.classList.add("hide-monster-strength");
            if (!state.respawnTimerVisible) overlayContainer.classList.add("hide-respawn-timer");
            if (!state.respawnIndicatorVisible) overlayContainer.classList.add("hide-respawn-indicator");
            if (!state.respawnTimerVisible && !state.respawnIndicatorVisible) overlayContainer.classList.add("hide-respawn-status");
            if (state.tabHidden) overlayContainer.classList.add("is-tab-hidden");
            if (state.gameplayVisible && !state.rosterPending) overlayContainer.classList.add("is-visible");
            overlayHoverControls.classList.toggle("is-enabled", state.gameplayVisible && !state.rosterPending && !state.tabHidden);

            levelNumber.textContent = state.level;
            let visibleUpgradeCount = 0;
            for (const upgrade of upgradeDefinitions) {
                const element = upgradeElements.get(upgrade.key);
                const value = Number(state[upgrade.key]) || 0;
                element.value.textContent = value;
                element.badge.classList.toggle("is-zero", value <= 0);
                if (value > 0) visibleUpgradeCount++;
            }
            upgradeRow.classList.toggle("is-empty", visibleUpgradeCount === 0);
            renderTimer(state);

            const roster = Array.isArray(state.roster) ? [...state.roster] : [];
            if (state.rosterPending) {
                ensureMonsterSquares(0);
            } else if (roster.length > 0) {
                roster.sort((left, right) => left.level - right.level || String(left.id).localeCompare(String(right.id)));
                const revealedBySource = new Map(
                    state.monsters
                        .filter((monster) => monster.sourceId != null)
                        .map((monster) => [String(monster.sourceId), monster])
                );
                ensureMonsterSquares(roster.length);
                roster.forEach((slot, index) => {
                    updateMonsterSquare(monstersSquares.children[index], slot.level, revealedBySource.get(String(slot.id)), state.strength, slot);
                });
            } else {
                const counts = OverlayApp.getCountsForLevel(state.level);
                const totalCount = counts.level1 + counts.level2 + counts.level3;
                ensureMonsterSquares(totalCount);

                let squareIndex = 0;
                for (let level = 1; level <= 3; level++) {
                    const selected = state.monsters.filter((monster) => monster.level === level);
                    for (let index = 0; index < counts[`level${level}`]; index++) {
                        updateMonsterSquare(monstersSquares.children[squareIndex], level, selected[index], state.strength);
                        squareIndex++;
                    }
                }
            }
        }

        applyViewportScale();
        window.addEventListener("resize", applyViewportScale);
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", applyViewportScale);
        }

        buildUpgradeRow();
        overlaySizeSlider.addEventListener("input", () => OverlayApp.setSquareSize(parseInt(overlaySizeSlider.value, 10)));
        overlayUpgradeSizeSlider.addEventListener("input", () => OverlayApp.setUpgradeSize(parseInt(overlayUpgradeSizeSlider.value, 10)));
        overlayColumnsSlider.addEventListener("input", () => OverlayApp.setColumnsCount(parseInt(overlayColumnsSlider.value, 10)));
        overlayHoverOpacitySlider.addEventListener("input", () => OverlayApp.setHoverOpacity(parseInt(overlayHoverOpacitySlider.value, 10)));
        overlayBgToggle.addEventListener("change", () => OverlayApp.setBgEnabled(overlayBgToggle.checked));
        overlayTimerToggle.addEventListener("change", () => OverlayApp.setTimerVisible(overlayTimerToggle.checked));
        overlayUpgradesToggle.addEventListener("change", () => OverlayApp.setUpgradesVisible(overlayUpgradesToggle.checked));
        overlayUpgradeTooltipsToggle.addEventListener("change", () => OverlayApp.setUpgradeTooltipsVisible(overlayUpgradeTooltipsToggle.checked));
        overlayMonsterHealthBarsToggle.addEventListener("change", () => OverlayApp.setMonsterHealthBarsVisible(overlayMonsterHealthBarsToggle.checked));
        overlayMonsterStrengthToggle.addEventListener("change", () => OverlayApp.setMonsterStrengthVisible(overlayMonsterStrengthToggle.checked));
        overlayRespawnTimerToggle.addEventListener("change", () => OverlayApp.setRespawnTimerVisible(overlayRespawnTimerToggle.checked));
        overlayRespawnIndicatorToggle.addEventListener("change", () => OverlayApp.setRespawnIndicatorVisible(overlayRespawnIndicatorToggle.checked));
        [overlaySizeSlider, overlayUpgradeSizeSlider, overlayColumnsSlider, overlayHoverOpacitySlider].forEach((slider) => {
            slider.addEventListener("pointerup", () => slider.blur());
            slider.addEventListener("change", () => slider.blur());
        });
        OverlayApp.subscribe(render);
        setInterval(() => {
            if (latestState && latestState.running && latestState.timerVisible) {
                renderTimer(latestState);
            }
        }, 1000);
        setInterval(() => {
            for (const square of monstersSquares.children) renderMonsterCooldown(square);
        }, 50);
    </script>
</body>
</html>
