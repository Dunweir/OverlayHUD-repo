<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Overlay</title>
    <link rel="stylesheet" href="overlay.css">
</head>
<body class="overlay-page">
    <div class="overlay">
        <div class="overlay-hover-controls" id="overlayHoverControls">
            <div class="overlay-control-panel">
                <div class="overlay-language-row" aria-label="Interface language">
                    <span data-i18n="languageLabel">Язык</span>
                    <div class="overlay-language-switch" role="group" aria-label="Interface language">
                        <button type="button" id="overlayLanguageRuBtn" data-language="ru">RU</button>
                        <button type="button" id="overlayLanguageEnBtn" data-language="en">EN</button>
                    </div>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlaySizeSlider" data-i18n="size">Размер</label>
                    <input type="range" id="overlaySizeSlider" min="40" max="86" value="64" step="2">
                    <span id="overlaySizeValue">64</span>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlayUpgradeSizeSlider" data-i18n="upgrades">Апгрейды</label>
                    <input type="range" id="overlayUpgradeSizeSlider" min="24" max="54" value="32" step="2">
                    <span id="overlayUpgradeSizeValue">32</span>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlayColumnsSlider" data-i18n="columns">Колонки</label>
                    <input type="range" id="overlayColumnsSlider" min="4" max="12" value="7" step="1">
                    <span id="overlayColumnsValue">7</span>
                </div>
                <div class="overlay-slider-row">
                    <label for="overlayHoverOpacitySlider" data-i18n="opacity">Прозрачность</label>
                    <input type="range" id="overlayHoverOpacitySlider" min="20" max="100" value="50" step="5">
                    <span id="overlayHoverOpacityValue">50%</span>
                </div>
                <div class="overlay-segment-row">
                    <span data-i18n="alignment">Выравнивание</span>
                    <div class="overlay-alignment-switch" role="group" aria-label="Overlay alignment">
                        <button type="button" data-alignment="left" aria-label="Align left">←</button>
                        <button type="button" data-alignment="center" aria-label="Align center">•</button>
                        <button type="button" data-alignment="right" aria-label="Align right">→</button>
                    </div>
                </div>
                <div class="overlay-segment-row">
                    <span>Апгрейды</span>
                    <div class="overlay-layout-switch" role="group" aria-label="Upgrade layout">
                        <button type="button" data-upgrade-layout="stacked" aria-label="Show upgrades below header">2 строки</button>
                        <button type="button" data-upgrade-layout="inline" aria-label="Show upgrades in header row">1 строка</button>
                    </div>
                </div>
                <div class="overlay-toggle-list">
                    <section class="overlay-toggle-group" aria-labelledby="overlayVisibilityGroupTitle">
                        <div class="overlay-toggle-group-title" id="overlayVisibilityGroupTitle" data-i18n="groupVisibility">Видимость</div>
                        <div class="overlay-toggle-group-items">
                            <label class="overlay-toggle-row">
                                <span data-i18n="background">Подложка</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayBgToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="levelBadge">Уровень</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayLevelBadgeToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="timer">Таймер</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayTimerToggle">
                                    <span></span>
                                </span>
                            </label>
                        </div>
                    </section>
                    <section class="overlay-toggle-group" aria-labelledby="overlayBlocksGroupTitle">
                        <div class="overlay-toggle-group-title" id="overlayBlocksGroupTitle" data-i18n="groupBlocks">Блоки</div>
                        <div class="overlay-toggle-group-items">
                            <label class="overlay-toggle-row">
                                <span data-i18n="upgrades">Апгрейды</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayUpgradesToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="monsterIcons">Монстры</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayMonsterIconsToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="mapValue">Map value</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayMapValueToggle">
                                    <span></span>
                                </span>
                            </label>
                        </div>
                    </section>
                    <section class="overlay-toggle-group" aria-labelledby="overlayDetailsGroupTitle">
                        <div class="overlay-toggle-group-title" id="overlayDetailsGroupTitle" data-i18n="groupDetails">Детали</div>
                        <div class="overlay-toggle-group-items">
                            <label class="overlay-toggle-row">
                                <span data-i18n="tooltips">Подсказки</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayUpgradeTooltipsToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="healthBar">ХП полоска</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayMonsterHealthBarsToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="strength">Сила</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayMonsterStrengthToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="respawnTime">Время респавна</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayRespawnTimerToggle">
                                    <span></span>
                                </span>
                            </label>
                            <label class="overlay-toggle-row">
                                <span data-i18n="cooldownIndicator">Индикатор КД</span>
                                <span class="overlay-toggle-switch">
                                    <input type="checkbox" id="overlayRespawnIndicatorToggle">
                                    <span></span>
                                </span>
                            </label>
                        </div>
                    </section>
                </div>
            </div>
            <div class="overlay-control-hotspot" id="overlayControlHotspot" aria-hidden="true"></div>
            <div class="overlay-drag-corner overlay-drag-corner-controls" data-drag-target="controls" aria-hidden="true"></div>
        </div>
        <div class="overlay-container" id="overlayContainer">
            <div class="overlay-drag-corner overlay-drag-corner-main" data-drag-target="overlay" aria-hidden="true"></div>
            <div class="overlay-topbar" id="overlayTopbar">
                <div class="overlay-header" id="overlayHeader">
                    <div class="level-badge" id="levelBadge">
                        <span class="level-core">
                            <span class="level-text" data-i18n="level">УРОВЕНЬ</span>
                            <span class="level-number" id="levelNumber">1</span>
                        </span>
                        <span class="timer" id="timer">00:00</span>
                    </div>
                    <div class="map-value-pill" id="mapValuePill" aria-live="polite">
                        <span class="map-value-label" data-i18n="mapValueShort">MAP</span>
                        <span class="map-value-number" id="mapValueNumber">$0</span>
                    </div>
                </div>
                <div class="upgrade-row" id="upgradeRow" aria-label="Player upgrades"></div>
            </div>
            <div class="monsters-squares" id="monstersSquares"></div>
        </div>
    </div>

    <script src="overlay-state.js"></script>
    <script>
        const overlayContainer = document.getElementById("overlayContainer");
        const overlayTopbar = document.getElementById("overlayTopbar");
        const overlayHoverControls = document.getElementById("overlayHoverControls");
        const levelBadge = document.getElementById("levelBadge");
        const levelNumber = document.getElementById("levelNumber");
        const timer = document.getElementById("timer");
        const upgradeRow = document.getElementById("upgradeRow");
        const monstersSquares = document.getElementById("monstersSquares");
        const overlaySizeSlider = document.getElementById("overlaySizeSlider");
        const overlaySizeValue = document.getElementById("overlaySizeValue");
        const overlayUpgradeSizeSlider = document.getElementById("overlayUpgradeSizeSlider");
        const overlayUpgradeSizeValue = document.getElementById("overlayUpgradeSizeValue");
        const overlayColumnsSlider = document.getElementById("overlayColumnsSlider");
        const overlayColumnsValue = document.getElementById("overlayColumnsValue");
        const overlayHoverOpacitySlider = document.getElementById("overlayHoverOpacitySlider");
        const overlayHoverOpacityValue = document.getElementById("overlayHoverOpacityValue");
        const overlayAlignmentButtons = [...document.querySelectorAll("[data-alignment]")];
        const overlayUpgradeLayoutButtons = [...document.querySelectorAll("[data-upgrade-layout]")];
        const overlayDragCorners = [...document.querySelectorAll("[data-drag-target]")];
        const overlayBgToggle = document.getElementById("overlayBgToggle");
        const overlayTimerToggle = document.getElementById("overlayTimerToggle");
        const overlayUpgradesToggle = document.getElementById("overlayUpgradesToggle");
        const overlayMonsterIconsToggle = document.getElementById("overlayMonsterIconsToggle");
        const overlayMapValueToggle = document.getElementById("overlayMapValueToggle");
        const overlayLevelBadgeToggle = document.getElementById("overlayLevelBadgeToggle");
        const overlayUpgradeTooltipsToggle = document.getElementById("overlayUpgradeTooltipsToggle");
        const overlayMonsterHealthBarsToggle = document.getElementById("overlayMonsterHealthBarsToggle");
        const overlayMonsterStrengthToggle = document.getElementById("overlayMonsterStrengthToggle");
        const overlayRespawnTimerToggle = document.getElementById("overlayRespawnTimerToggle");
        const overlayRespawnIndicatorToggle = document.getElementById("overlayRespawnIndicatorToggle");
        const overlayLanguageRuBtn = document.getElementById("overlayLanguageRuBtn");
        const overlayLanguageEnBtn = document.getElementById("overlayLanguageEnBtn");
        const mapValuePill = document.getElementById("mapValuePill");
        const mapValueNumber = document.getElementById("mapValueNumber");
        let latestState = null;
        let renderedSquareCount = 0;
        let lastTimerText = "";
        let currentLanguage = "ru";
        let topbarInlineCleanupTimer = 0;
        let topbarInlineCleanupVersion = 0;
        let layoutReclampTimer = 0;
        const monsterImageLoads = new Map();
        const upgradeElements = new Map();
        const viewportScale = {
            baseWidth: 1920,
            baseHeight: 1080,
            min: 0.45,
            max: 1.5,
            edgeOffset: 20,
            snapDistance: 18
        };
        let activeDrag = null;
        let lastPositionLayoutKey = "";
        const upgradeDefinitions = [
            { key: "strength", name: "Strength", image: "upgrades/Strength_Upgrade.webp", color: "#ff9a3d", background: "rgba(255, 106, 22, 0.2)" },
            { key: "tumbleLaunch", name: "Tumble Launch", image: "upgrades/Tumble_Launch_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" },
            { key: "range", name: "Range", image: "upgrades/Range_Upgrade.webp", color: "#ff9a3d", background: "rgba(255, 106, 22, 0.2)" },
            { key: "sprintSpeed", name: "Sprint Speed", image: "upgrades/Sprint_Speed_Upgrade.webp", color: "#ffe05a", background: "rgba(229, 179, 16, 0.2)" },
            { key: "mapPlayerCount", name: "Map Player Count", image: "upgrades/Upgrade_Map-Player-Count_Albedo.webp", color: "#65e887", background: "rgba(29, 165, 73, 0.2)" },
            { key: "tumbleWings", name: "Tumble Wings", image: "upgrades/Tumble_Wings_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" },
            { key: "crouchRest", name: "Crouch Rest", image: "upgrades/Crouch_Rest_Upgrade.webp", color: "#ffe05a", background: "rgba(229, 179, 16, 0.2)" },
            { key: "extraJump", name: "Extra Jump", image: "upgrades/Extra_Jump_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" },
            { key: "tumbleClimb", name: "Tumble Climb", image: "upgrades/Tumble_Climb_Upgrade.webp", color: "#58bdff", background: "rgba(32, 151, 235, 0.2)" }
        ];
        const interfaceText = {
            ru: {
                languageLabel: "Язык",
                size: "Размер",
                upgrades: "Апгрейды",
                columns: "Колонки",
                opacity: "Прозрачность",
                alignment: "Выравнивание",
                groupVisibility: "Видимость",
                groupBlocks: "Блоки",
                groupDetails: "Детали",
                background: "Подложка",
                timer: "Таймер",
                monsterIcons: "Монстры",
                mapValue: "Цена карты",
                mapValueShort: "КАРТА",
                levelBadge: "Уровень",
                tooltips: "Подсказки",
                healthBar: "ХП полоска",
                strength: "Сила",
                respawnTime: "Время респавна",
                cooldownIndicator: "Индикатор КД",
                level: "УРОВЕНЬ",
                healthUnknown: "ХП: ?",
                healthValueUnknown: (health) => `ХП: ${health} / ?`,
                healthValue: (health, maxHealth) => `ХП: ${health} / ${maxHealth}`,
                strengthUnknown: "Сила: ?",
                strengthImpossible: "Сила: нельзя поднять",
                strengthValue: (strength) => `Сила: ${strength}`,
                cooldownShort: "КД",
                upgradesNames: {
                    strength: "Сила",
                    tumbleLaunch: "Кувырок: запуск",
                    range: "Дальность",
                    sprintSpeed: "Скорость бега",
                    mapPlayerCount: "Игроки на карте",
                    tumbleWings: "Кувырок: крылья",
                    crouchRest: "Отдых в приседе",
                    extraJump: "Доп. прыжок",
                    tumbleClimb: "Кувырок: подъём"
                }
            },
            en: {
                languageLabel: "Language",
                size: "Size",
                upgrades: "Upgrades",
                columns: "Columns",
                opacity: "Opacity",
                alignment: "Alignment",
                groupVisibility: "Visibility",
                groupBlocks: "Blocks",
                groupDetails: "Details",
                background: "Background",
                timer: "Timer",
                monsterIcons: "Monsters",
                mapValue: "Map value",
                mapValueShort: "MAP",
                levelBadge: "Level",
                tooltips: "Tooltips",
                healthBar: "HP bar",
                strength: "Strength",
                respawnTime: "Respawn time",
                cooldownIndicator: "CD indicator",
                level: "LEVEL",
                healthUnknown: "HP: ?",
                healthValueUnknown: (health) => `HP: ${health} / ?`,
                healthValue: (health, maxHealth) => `HP: ${health} / ${maxHealth}`,
                strengthUnknown: "Strength: ?",
                strengthImpossible: "Strength: cannot be lifted",
                strengthValue: (strength) => `Strength: ${strength}`,
                cooldownShort: "CD",
                upgradesNames: {
                    strength: "Strength",
                    tumbleLaunch: "Tumble Launch",
                    range: "Range",
                    sprintSpeed: "Sprint Speed",
                    mapPlayerCount: "Map Player Count",
                    tumbleWings: "Tumble Wings",
                    crouchRest: "Crouch Rest",
                    extraJump: "Extra Jump",
                    tumbleClimb: "Tumble Climb"
                }
            }
        };

        function getText(key) {
            return interfaceText[currentLanguage][key] || interfaceText.ru[key] || key;
        }

        function getUpgradeName(upgrade) {
            return interfaceText[currentLanguage].upgradesNames[upgrade.key] || upgrade.name;
        }

        function formatCurrency(value) {
            const rounded = Math.max(0, Math.round(Number(value) || 0));
            return `$${rounded.toLocaleString("en-US")}`;
        }

        function applyInterfaceLanguage(interfaceLanguage) {
            currentLanguage = interfaceLanguage === "en" ? "en" : "ru";
            document.documentElement.lang = currentLanguage;
            document.querySelectorAll("[data-i18n]").forEach((element) => {
                element.textContent = getText(element.dataset.i18n);
            });
            overlayLanguageRuBtn.classList.toggle("is-active", currentLanguage === "ru");
            overlayLanguageEnBtn.classList.toggle("is-active", currentLanguage === "en");
            overlayLanguageRuBtn.setAttribute("aria-pressed", String(currentLanguage === "ru"));
            overlayLanguageEnBtn.setAttribute("aria-pressed", String(currentLanguage === "en"));
            for (const upgrade of upgradeDefinitions) {
                const element = upgradeElements.get(upgrade.key);
                if (!element) continue;
                const name = getUpgradeName(upgrade);
                element.badge.dataset.upgradeName = name;
                element.badge.querySelector("img").alt = name;
                element.tooltip.textContent = name;
            }
        }

        function applyViewportScale() {
            const baseScale = Math.min(
                window.innerWidth / viewportScale.baseWidth,
                window.innerHeight / viewportScale.baseHeight
            );
            const sizingState = latestState || { squareSize: 70, columnsCount: 7 };
            const squareSize = Number(sizingState.squareSize) || 64;
            const columnsCount = Number(sizingState.columnsCount) || 7;
            const gridWidth = columnsCount * squareSize + Math.max(0, columnsCount - 1) * 10;
            const containerWidth = Math.max(310, gridWidth + 30);
            const fitScale = (window.innerWidth - viewportScale.edgeOffset * 2) / containerWidth;
            const scale = Math.min(baseScale, fitScale);
            const clampedScale = Math.min(viewportScale.max, Math.max(viewportScale.min, scale));
            const availableWidth = Math.max(240, (window.innerWidth - viewportScale.edgeOffset * 2) / clampedScale);

            document.documentElement.style.setProperty("--viewport-scale", clampedScale.toFixed(4));
            document.documentElement.style.setProperty("--overlay-edge-offset", `${viewportScale.edgeOffset}px`);
            document.documentElement.style.setProperty("--overlay-available-width", `${availableWidth}px`);
        }

        function getSavedPosition(targetName) {
            if (!latestState) return null;
            const position = targetName === "controls" ? latestState.controlsPosition : latestState.overlayPosition;
            if (!position || !Number.isFinite(Number(position.left)) || !Number.isFinite(Number(position.top))) return null;
            return {
                left: Number(position.left),
                top: Number(position.top),
                anchorX: ["left", "center", "right"].includes(position.anchorX) ? position.anchorX : null,
                anchorY: ["top", "center", "bottom"].includes(position.anchorY) ? position.anchorY : null
            };
        }

        function getPositionMetrics(element) {
            const safe = viewportScale.edgeOffset;
            const rect = element.getBoundingClientRect();
            const width = Math.min(rect.width || element.offsetWidth || 0, window.innerWidth - safe * 2);
            const height = Math.min(rect.height || element.offsetHeight || 0, window.innerHeight - safe * 2);
            return {
                safe,
                width,
                height,
                left: safe,
                centerX: Math.round((window.innerWidth - width) / 2),
                right: window.innerWidth - safe - width,
                top: safe,
                centerY: Math.round((window.innerHeight - height) / 2),
                bottom: window.innerHeight - safe - height
            };
        }

        function clampPosition(element, left, top) {
            const metrics = getPositionMetrics(element);
            return {
                left: Math.min(Math.max(metrics.safe, left), Math.max(metrics.safe, metrics.right)),
                top: Math.min(Math.max(metrics.safe, top), Math.max(metrics.safe, metrics.bottom))
            };
        }

        function resolveAnchoredPosition(element, position) {
            if (!position) return null;
            const metrics = getPositionMetrics(element);
            const left = position.anchorX === "left" ? metrics.left
                : position.anchorX === "center" ? metrics.centerX
                    : position.anchorX === "right" ? metrics.right
                        : position.left;
            const top = position.anchorY === "top" ? metrics.top
                : position.anchorY === "center" ? metrics.centerY
                    : position.anchorY === "bottom" ? metrics.bottom
                        : position.top;
            return { ...position, ...clampPosition(element, left, top) };
        }

        function snapPosition(element, left, top) {
            const metrics = getPositionMetrics(element);
            const snapDistance = viewportScale.snapDistance;
            const targets = {
                left: [
                    { anchor: "left", value: metrics.left },
                    { anchor: "center", value: metrics.centerX },
                    { anchor: "right", value: metrics.right }
                ],
                top: [
                    { anchor: "top", value: metrics.top },
                    { anchor: "center", value: metrics.centerY },
                    { anchor: "bottom", value: metrics.bottom }
                ]
            };
            let snappedLeft = left;
            let snappedTop = top;
            let anchorX = null;
            let anchorY = null;
            for (const target of targets.left) {
                if (Math.abs(left - target.value) <= snapDistance) {
                    snappedLeft = target.value;
                    anchorX = target.anchor;
                    break;
                }
            }
            for (const target of targets.top) {
                if (Math.abs(top - target.value) <= snapDistance) {
                    snappedTop = target.value;
                    anchorY = target.anchor;
                    break;
                }
            }
            return { ...clampPosition(element, snappedLeft, snappedTop), anchorX, anchorY };
        }

        function positionElement(element, targetName, position) {
            element.classList.toggle("is-positioned", Boolean(position));
            if (!position) {
                element.style.removeProperty("--overlay-left");
                element.style.removeProperty("--overlay-top");
                return;
            }

            const resolved = resolveAnchoredPosition(element, position);
            element.style.setProperty("--overlay-left", `${Math.round(resolved.left)}px`);
            element.style.setProperty("--overlay-top", `${Math.round(resolved.top)}px`);
        }

        function applySavedPositions() {
            positionElement(overlayContainer, "overlay", getSavedPosition("overlay"));
            positionElement(overlayHoverControls, "controls", getSavedPosition("controls"));
        }

        function reclampPositionedElement(element) {
            if (!element.classList.contains("is-positioned")) return;
            const left = parseFloat(element.style.getPropertyValue("--overlay-left"));
            const top = parseFloat(element.style.getPropertyValue("--overlay-top"));
            if (!Number.isFinite(left) || !Number.isFinite(top)) return;

            const clamped = clampPosition(element, left, top);
            element.style.setProperty("--overlay-left", `${Math.round(clamped.left)}px`);
            element.style.setProperty("--overlay-top", `${Math.round(clamped.top)}px`);
        }

        function scheduleLayoutReclamp() {
            window.clearTimeout(layoutReclampTimer);
            layoutReclampTimer = window.setTimeout(() => {
                applySavedPositions();
                reclampPositionedElement(overlayContainer);
                reclampPositionedElement(overlayHoverControls);
            }, 330);
        }

        function getPositionLayoutKey(state) {
            return JSON.stringify({
                width: window.innerWidth,
                height: window.innerHeight,
                squareSize: state.squareSize,
                upgradeSize: state.upgradeSize,
                columnsCount: state.columnsCount,
                bgEnabled: state.bgEnabled,
                timerVisible: state.timerVisible,
                upgradesVisible: state.upgradesVisible,
                monsterIconsVisible: state.monsterIconsVisible,
                mapValueVisible: state.mapValueVisible,
                mapValue: state.mapValue,
                levelBadgeVisible: state.levelBadgeVisible,
                overlayAlignment: state.overlayAlignment,
                tabHidden: state.tabHidden,
                overlayPosition: state.overlayPosition,
                controlsPosition: state.controlsPosition
            });
        }

        function applySavedPositionsWhenLayoutChanges(state) {
            const positionLayoutKey = getPositionLayoutKey(state);
            const needsInitialPosition = Boolean((state.overlayPosition && !overlayContainer.style.getPropertyValue("--overlay-left"))
                || (state.controlsPosition && !overlayHoverControls.style.getPropertyValue("--overlay-left")));
            if (!needsInitialPosition && positionLayoutKey === lastPositionLayoutKey) return;

            lastPositionLayoutKey = positionLayoutKey;
            applySavedPositions();
        }

        function startOverlayDrag(event) {
            const targetName = event.currentTarget.dataset.dragTarget;
            const element = targetName === "controls" ? overlayHoverControls : overlayContainer;
            if (!element || event.button !== 0) return;

            const rect = element.getBoundingClientRect();
            const startPosition = clampPosition(element, rect.left, rect.top);
            activeDrag = {
                targetName,
                element,
                handle: event.currentTarget,
                pointerId: event.pointerId,
                startX: event.clientX,
                startY: event.clientY,
                startLeft: startPosition.left,
                startTop: startPosition.top
            };
            element.classList.add("is-dragging", "is-positioned");
            document.documentElement.dataset.overlayDragging = targetName;
            element.style.setProperty("--overlay-left", `${Math.round(startPosition.left)}px`);
            element.style.setProperty("--overlay-top", `${Math.round(startPosition.top)}px`);
            event.currentTarget.setPointerCapture(event.pointerId);
            window.addEventListener("pointermove", moveOverlayDrag, true);
            window.addEventListener("pointerup", stopOverlayDrag, true);
            window.addEventListener("pointercancel", stopOverlayDrag, true);
            event.preventDefault();
        }

        function moveOverlayDrag(event) {
            if (!activeDrag || event.pointerId !== activeDrag.pointerId) return;
            const nextPosition = snapPosition(
                activeDrag.element,
                activeDrag.startLeft + event.clientX - activeDrag.startX,
                activeDrag.startTop + event.clientY - activeDrag.startY
            );
            activeDrag.element.style.setProperty("--overlay-left", `${Math.round(nextPosition.left)}px`);
            activeDrag.element.style.setProperty("--overlay-top", `${Math.round(nextPosition.top)}px`);
            event.preventDefault();
        }

        function stopOverlayDrag(event) {
            if (!activeDrag || event.pointerId !== activeDrag.pointerId) return;
            const finalPosition = snapPosition(activeDrag.element, activeDrag.element.getBoundingClientRect().left, activeDrag.element.getBoundingClientRect().top);
            activeDrag.element.classList.remove("is-dragging");
            try {
                activeDrag.handle.releasePointerCapture(event.pointerId);
            } catch {
                // The capture can already be gone if Electron briefly changed hit-testing.
            }
            if (activeDrag.targetName === "controls") {
                OverlayApp.setControlsPosition(finalPosition);
            } else {
                OverlayApp.setOverlayPosition(finalPosition);
            }
            lastPositionLayoutKey = "";
            activeDrag = null;
            delete document.documentElement.dataset.overlayDragging;
            window.removeEventListener("pointermove", moveOverlayDrag, true);
            window.removeEventListener("pointerup", stopOverlayDrag, true);
            window.removeEventListener("pointercancel", stopOverlayDrag, true);
            event.preventDefault();
        }

        function buildUpgradeRow() {
            for (const upgrade of upgradeDefinitions) {
                const badge = document.createElement("div");
                badge.className = "upgrade-stat";
                badge.dataset.upgradeName = upgrade.name;
                badge.style.setProperty("--upgrade-color", upgrade.color);
                badge.style.setProperty("--upgrade-background", upgrade.background);

                const img = document.createElement("img");
                img.src = upgrade.image;
                img.alt = upgrade.name;
                badge.appendChild(img);

                const value = document.createElement("span");
                value.textContent = "0";
                badge.appendChild(value);

                const tooltip = document.createElement("span");
                tooltip.className = "upgrade-tooltip";
                tooltip.textContent = getUpgradeName(upgrade);
                badge.appendChild(tooltip);

                upgradeElements.set(upgrade.key, { badge, value, tooltip });
                upgradeRow.appendChild(badge);
            }
        }

        function preloadMonsterImage(src) {
            if (!monsterImageLoads.has(src)) {
                monsterImageLoads.set(src, new Promise((resolve) => {
                    const preload = new Image();
                    let finished = false;
                    const finish = () => {
                        if (finished) return;
                        finished = true;
                        if (typeof preload.decode === "function") {
                            preload.decode().catch(() => {}).finally(() => resolve(src));
                        } else {
                            resolve(src);
                        }
                    };
                    preload.onload = finish;
                    preload.onerror = () => resolve(src);
                    preload.src = src;
                    if (preload.complete) finish();
                }));
            }
            return monsterImageLoads.get(src);
        }

        function clearSquare(square) {
            square.dataset.monsterKey = "";
            square.dataset.imagePending = "";
            square.dataset.monsterHealthKey = "";
            square.dataset.monsterHealthValue = "";
            square.dataset.respawnFlashKey = "";
            square.classList.remove("is-revealing");
            square.classList.remove("is-damaged");
            square.classList.remove("is-cooldown-reduced");
            clearMonsterCooldown(square);
            square.querySelectorAll(".monster-reveal-image, .monster-damage-pop").forEach((element) => element.remove());
            const img = square.firstElementChild;
            if (!img.src.includes("monsters/unknown.webp")) {
                img.src = "monsters/unknown.webp";
            }
            if (img.alt !== "Unknown Monster") {
                img.alt = "Unknown Monster";
            }
            square.removeAttribute("title");
            square.querySelectorAll(".monster-count, .strength-required, .monster-tooltip, .monster-health-bar").forEach((element) => element.remove());
        }

        function getMonsterStrengthText(monster) {
            if (!monster || monster.strength === undefined) return getText("strengthUnknown");
            if (monster.strength === "impossible") return getText("strengthImpossible");
            return getText("strengthValue")(monster.strength);
        }

        function getMonsterHealthText(status) {
            const health = Number(status?.health);
            const maxHealth = Number(status?.maxHealth);
            if (!Number.isFinite(health)) return getText("healthUnknown");
            if (!Number.isFinite(maxHealth) || maxHealth <= 0) return getText("healthValueUnknown")(Math.ceil(health));
            return getText("healthValue")(Math.ceil(health), Math.ceil(maxHealth));
        }

        function updateMonsterHealthBar(square, status) {
            let bar = square.querySelector(".monster-health-bar");
            if (!bar) {
                bar = document.createElement("div");
                bar.className = "monster-health-bar";
                bar.innerHTML = '<span class="monster-health-fill"></span>';
                square.appendChild(bar);
            }

            const health = Number(status?.health);
            const maxHealth = Number(status?.maxHealth);
            const hasHealth = Number.isFinite(health) && Number.isFinite(maxHealth) && maxHealth > 0;
            bar.classList.toggle("is-hidden", !hasHealth);
            if (!hasHealth) return;

            const ratio = Math.min(1, Math.max(0, health / maxHealth));
            bar.style.setProperty("--monster-health-ratio", `${Math.round(ratio * 1000) / 10}%`);
            bar.classList.toggle("is-warning", ratio > 0.3 && ratio <= 0.6);
            bar.classList.toggle("is-low", ratio > 0.1 && ratio <= 0.3);
            bar.classList.toggle("is-critical", ratio > 0 && ratio <= 0.1);
            bar.classList.toggle("is-empty", ratio <= 0);
        }

        function updateMonsterDamageFeedback(square, status, monsterKey) {
            const health = Number(status?.health);
            if (!Number.isFinite(health)) {
                square.dataset.monsterHealthKey = monsterKey;
                square.dataset.monsterHealthValue = "";
                return;
            }

            const previousKey = square.dataset.monsterHealthKey;
            const previousHealth = Number(square.dataset.monsterHealthValue);
            square.dataset.monsterHealthKey = monsterKey;
            square.dataset.monsterHealthValue = String(health);

            if (previousKey !== monsterKey || !Number.isFinite(previousHealth) || health >= previousHealth) return;

            const damage = Math.max(1, Math.ceil(previousHealth - health));
            square.classList.remove("is-damaged");
            void square.offsetWidth;
            square.classList.add("is-damaged");
            setTimeout(() => {
                if (square.dataset.monsterHealthKey === monsterKey) square.classList.remove("is-damaged");
            }, 1020);

            const damagePop = document.createElement("div");
            damagePop.className = "monster-damage-pop";
            damagePop.textContent = `-${damage} HP`;
            square.appendChild(damagePop);
            setTimeout(() => damagePop.remove(), 1120);
        }

        function updateMonsterTooltip(square, monster, status) {
            let tooltip = square.querySelector(".monster-tooltip");
            if (!tooltip) {
                tooltip = document.createElement("div");
                tooltip.className = "monster-tooltip";
                tooltip.innerHTML = '<span class="monster-tooltip-name"></span><span class="monster-tooltip-health"></span><span class="monster-tooltip-strength"></span>';
                square.appendChild(tooltip);
            }

            tooltip.querySelector(".monster-tooltip-name").textContent = monster.name;
            tooltip.querySelector(".monster-tooltip-health").textContent = getMonsterHealthText(status);
            tooltip.querySelector(".monster-tooltip-strength").textContent = getMonsterStrengthText(monster);
        }

        function clearMonsterCooldown(square) {
            square.classList.remove("is-on-cooldown");
            square.dataset.cooldownActive = "false";
            square.dataset.respawnEndsAt = "";
            square.dataset.respawnDuration = "";
            square.classList.remove("is-cooldown-reduced");
            const time = square.querySelector(".monster-cooldown-time");
            if (time) time.textContent = "";
        }

        function updateMonsterCooldownFeedback(square, status, monsterKey) {
            const flashAt = Number(status?.respawnFlashAt);
            const flashUntil = Number(status?.respawnFlashUntil);
            if (!Number.isFinite(flashAt) || !Number.isFinite(flashUntil) || flashUntil <= Date.now()) return;

            const flashKey = `${monsterKey}:${flashAt}`;
            if (square.dataset.respawnFlashKey === flashKey) return;
            square.dataset.respawnFlashKey = flashKey;
            square.classList.remove("is-cooldown-reduced");
            void square.offsetWidth;
            square.classList.add("is-cooldown-reduced");
            setTimeout(() => {
                if (square.dataset.respawnFlashKey === flashKey) square.classList.remove("is-cooldown-reduced");
            }, 1120);
        }

        function configureMonsterCooldown(square, status) {
            if (!status || status.alive !== false) {
                clearMonsterCooldown(square);
                return;
            }

            square.dataset.cooldownActive = "true";
            square.dataset.respawnEndsAt = status.respawnEndsAt == null ? "" : String(status.respawnEndsAt);
            square.dataset.respawnDuration = status.respawnDuration == null ? "" : String(status.respawnDuration);
            renderMonsterCooldown(square);
        }

        function renderMonsterCooldown(square) {
            if (square.dataset.cooldownActive !== "true") return;
            const cooldown = square.querySelector(".monster-cooldown");
            const time = square.querySelector(".monster-cooldown-time");
            const endsAt = Number(square.dataset.respawnEndsAt);
            const duration = Number(square.dataset.respawnDuration);

            square.classList.add("is-on-cooldown");
            if (!Number.isFinite(endsAt) || endsAt <= 0 || !Number.isFinite(duration) || duration <= 0) {
                cooldown.style.setProperty("--cooldown-angle", "0deg");
                time.textContent = getText("cooldownShort");
                return;
            }

            const remaining = Math.max(0, (endsAt - Date.now()) / 1000);
            if (remaining <= 0) {
                clearMonsterCooldown(square);
                return;
            }

            const elapsed = Math.min(1, Math.max(0, 1 - remaining / duration));
            cooldown.style.setProperty("--cooldown-angle", `${elapsed * 360}deg`);
            const seconds = Math.ceil(remaining);
            time.textContent = `${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`;
        }

        function updateMonsterSquare(square, level, monster, currentStrength, status = null) {
            square.classList.remove("level-1", "level-2", "level-3");
            square.classList.add(`level-${level}`);

            if (!monster) {
                clearSquare(square);
                return;
            }

            const img = square.firstElementChild;
            const monsterKey = String(monster.id || monster.name);
            const shouldReveal = square.dataset.monsterKey !== monsterKey;
            square.dataset.monsterKey = monsterKey;
            if (shouldReveal) square.dataset.imagePending = monster.image;
            configureMonsterCooldown(square, status);

            let count = square.querySelector(".monster-count");
            if (!monster.count && count) {
                count.remove();
            }

            if (monster.count) {
                if (!count) {
                    count = document.createElement("div");
                    count.className = "monster-count";
                    square.appendChild(count);
                }
                count.textContent = `x${monster.count}`;
            }

            let required = square.querySelector(".strength-required");
            if (!required) {
                required = document.createElement("div");
                required.className = "strength-required";
                square.appendChild(required);
            }

            if (monster.strength === "impossible") {
                required.textContent = "💪X";
                required.style.color = "";
            } else if (monster.strength === undefined) {
                required.textContent = "?";
                required.style.color = "";
            } else {
                required.textContent = `💪${monster.strength}`;
                required.style.color = currentStrength >= monster.strength ? "#4CAF50" : "#ff4444";
            }

            updateMonsterTooltip(square, monster, status);
            updateMonsterHealthBar(square, status);
            updateMonsterDamageFeedback(square, status, monsterKey);
            updateMonsterCooldownFeedback(square, status, monsterKey);

            if (shouldReveal) {
                preloadMonsterImage(monster.image).then(() => {
                    if (square.dataset.monsterKey !== monsterKey) return;
                    square.querySelectorAll(".monster-reveal-image").forEach((element) => element.remove());

                    const revealImage = document.createElement("img");
                    revealImage.className = "monster-reveal-image";
                    revealImage.src = monster.image;
                    revealImage.alt = monster.name;
                    square.appendChild(revealImage);

                    square.classList.remove("is-revealing");
                    requestAnimationFrame(() => {
                        if (square.dataset.monsterKey === monsterKey) square.classList.add("is-revealing");
                    });

                    let finalized = false;
                    const finalizeReveal = () => {
                        if (finalized) return;
                        finalized = true;
                        if (square.dataset.monsterKey === monsterKey) {
                            img.src = monster.image;
                            img.alt = monster.name;
                            square.dataset.imagePending = "";
                        }
                        revealImage.remove();
                        if (!square.querySelector(".monster-reveal-image")) square.classList.remove("is-revealing");
                    };
                    revealImage.addEventListener("animationend", finalizeReveal, { once: true });
                    setTimeout(finalizeReveal, 900);
                });
            } else if (square.dataset.imagePending !== monster.image && !img.src.includes(monster.image)) {
                img.src = monster.image;
                img.alt = monster.name;
            }
        }

        function ensureMonsterSquares(totalCount) {
            while (renderedSquareCount < totalCount) {
                const square = document.createElement("div");
                square.className = "monster-square level-1 is-slot-entering";

                const img = document.createElement("img");
                img.className = "monster-base-image";
                img.src = "monsters/unknown.webp";
                img.alt = "Unknown Monster";
                square.appendChild(img);

                const cooldown = document.createElement("div");
                cooldown.className = "monster-cooldown";
                const cooldownTime = document.createElement("span");
                cooldownTime.className = "monster-cooldown-time";
                cooldown.appendChild(cooldownTime);
                square.appendChild(cooldown);

                monstersSquares.appendChild(square);
                renderedSquareCount++;
            }

            while (renderedSquareCount > totalCount) {
                monstersSquares.lastElementChild.remove();
                renderedSquareCount--;
            }
        }

        function renderTimer(state) {
            const seconds = OverlayApp.getTimerSeconds(state);
            const timerText = OverlayApp.formatTime(seconds);
            const isLongTimer = seconds >= 3600;
            timer.classList.toggle("is-long", isLongTimer);
            overlayContainer.classList.toggle("is-timer-long", isLongTimer);
            if (timerText !== lastTimerText) {
                timer.textContent = timerText;
                lastTimerText = timerText;
                const isTopbarTransitionHeld = overlayContainer.classList.contains("is-topbar-inline")
                    && latestState
                    && (!latestState.upgradesVisible || (!latestState.levelBadgeVisible && !latestState.timerVisible));
                if ((!latestState || latestState.upgradesVisible) && !isTopbarTransitionHeld) requestAnimationFrame(updateTopbarLayout);
            }
        }

        function getHorizontalOuterSize(element) {
            const styles = getComputedStyle(element);
            return element.offsetWidth + (parseFloat(styles.marginLeft) || 0) + (parseFloat(styles.marginRight) || 0);
        }

        function getOverlayInnerWidth() {
            const styles = getComputedStyle(overlayContainer);
            return overlayContainer.clientWidth - (parseFloat(styles.paddingLeft) || 0) - (parseFloat(styles.paddingRight) || 0);
        }

        function scheduleTopbarInlineCleanup(predicate, delay = 300) {
            const cleanupVersion = ++topbarInlineCleanupVersion;
            window.clearTimeout(topbarInlineCleanupTimer);
            topbarInlineCleanupTimer = window.setTimeout(() => {
                if (cleanupVersion === topbarInlineCleanupVersion && latestState && predicate(latestState)) {
                    updateTopbarLayout();
                }
            }, delay);
        }

        function updateTopbarLayout(options = {}) {
            if (!latestState || !overlayContainer.isConnected) return;

            if (options.keepInlineUntilUpgradesHidden || options.keepInlineUntilHeaderHidden) {
                overlayContainer.classList.add("is-topbar-inline");
                return;
            }

            const hasMapValue = Boolean(latestState.mapValueVisible && Number(latestState.mapValue) > 0);
            const hasHeader = Boolean(latestState.levelBadgeVisible || latestState.timerVisible || hasMapValue);
            const visibleUpgrades = [...upgradeRow.children].filter((element) => !element.classList.contains("is-zero"));
            const hasUpgrades = Boolean(latestState.upgradesVisible && visibleUpgrades.length > 0);
            overlayContainer.classList.toggle("is-topbar-inline", latestState.upgradeLayout === "inline" && hasHeader && hasUpgrades);
        }

        function render(state) {
            const previousState = latestState;
            const keepInlineUntilUpgradesHidden = overlayContainer.classList.contains("is-topbar-inline") && !state.upgradesVisible;
            const keepInlineUntilHeaderHidden = overlayContainer.classList.contains("is-topbar-inline")
                && state.upgradesVisible
                && !state.levelBadgeVisible
                && !state.timerVisible;
            const majorVisibilityChanged = Boolean(previousState && (
                previousState.upgradesVisible !== state.upgradesVisible
                || previousState.monsterIconsVisible !== state.monsterIconsVisible
                || previousState.mapValueVisible !== state.mapValueVisible
                || previousState.levelBadgeVisible !== state.levelBadgeVisible
                || previousState.timerVisible !== state.timerVisible
            ));
            if (state.upgradesVisible) {
                topbarInlineCleanupVersion++;
                window.clearTimeout(topbarInlineCleanupTimer);
            }
            latestState = state;
            applyInterfaceLanguage(state.interfaceLanguage);
            document.documentElement.style.setProperty("--square-size", `${state.squareSize}px`);
            document.documentElement.style.setProperty("--upgrade-size", `${state.upgradeSize}px`);
            document.documentElement.style.setProperty("--columns-count", state.columnsCount);
            const monsterGridWidth = state.columnsCount * state.squareSize + Math.max(0, state.columnsCount - 1) * 10;
            document.documentElement.style.setProperty("--monster-grid-width", `${monsterGridWidth}px`);
            applyViewportScale();
            overlaySizeSlider.value = state.squareSize;
            overlaySizeValue.textContent = state.squareSize;
            overlayUpgradeSizeSlider.value = state.upgradeSize;
            overlayUpgradeSizeValue.textContent = state.upgradeSize;
            overlayColumnsSlider.value = state.columnsCount;
            overlayColumnsValue.textContent = state.columnsCount;
            overlayHoverOpacitySlider.value = state.hoverOpacity;
            overlayHoverOpacityValue.textContent = `${state.hoverOpacity}%`;
            overlayHoverControls.dataset.hoverOpacity = state.hoverOpacity;
            overlayAlignmentButtons.forEach((button) => {
                const isActive = button.dataset.alignment === state.overlayAlignment;
                button.classList.toggle("is-active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
            overlayUpgradeLayoutButtons.forEach((button) => {
                const isActive = button.dataset.upgradeLayout === state.upgradeLayout;
                button.classList.toggle("is-active", isActive);
                button.setAttribute("aria-pressed", String(isActive));
            });
            overlayBgToggle.checked = state.bgEnabled;
            overlayTimerToggle.checked = state.timerVisible;
            overlayUpgradesToggle.checked = state.upgradesVisible;
            overlayMonsterIconsToggle.checked = state.monsterIconsVisible;
            overlayMapValueToggle.checked = state.mapValueVisible;
            overlayLevelBadgeToggle.checked = state.levelBadgeVisible;
            overlayUpgradeTooltipsToggle.checked = state.upgradeTooltipsVisible;
            overlayMonsterHealthBarsToggle.checked = state.monsterHealthBarsVisible;
            overlayMonsterStrengthToggle.checked = state.monsterStrengthVisible;
            overlayRespawnTimerToggle.checked = state.respawnTimerVisible;
            overlayRespawnIndicatorToggle.checked = state.respawnIndicatorVisible;

            const roster = Array.isArray(state.roster) ? [...state.roster] : [];
            const hasMonsterIconSlots = !state.rosterPending
                && (roster.length > 0 || (Array.isArray(state.monsters) && state.monsters.length > 0));
            const overlayShouldBeVisible = Boolean(state.gameplayVisible && hasMonsterIconSlots);

            const keepOverlayPositioned = overlayContainer.classList.contains("is-positioned");
            const keepOverlayDragging = overlayContainer.classList.contains("is-dragging");
            overlayContainer.className = "overlay-container";
            overlayContainer.classList.toggle("is-positioned", keepOverlayPositioned || Boolean(state.overlayPosition));
            overlayContainer.classList.toggle("is-dragging", keepOverlayDragging);
            overlayContainer.classList.add(`align-${state.overlayAlignment}`);
            if (keepInlineUntilUpgradesHidden || keepInlineUntilHeaderHidden) overlayContainer.classList.add("is-topbar-inline");
            if (state.bgEnabled) overlayContainer.classList.add("with-bg");
            if (!state.timerVisible) overlayContainer.classList.add("hide-level-timer");
            if (!state.upgradesVisible) overlayContainer.classList.add("hide-upgrades");
            if (!state.monsterIconsVisible) overlayContainer.classList.add("hide-monster-icons");
            if (!state.mapValueVisible || Number(state.mapValue) <= 0) overlayContainer.classList.add("hide-map-value");
            if (!state.levelBadgeVisible) overlayContainer.classList.add("hide-level-badge");
            if (!state.upgradeTooltipsVisible) overlayContainer.classList.add("hide-upgrade-tooltips");
            if (!state.upgradeTooltipsVisible) overlayContainer.classList.add("hide-tooltips");
            if (!state.monsterHealthBarsVisible) overlayContainer.classList.add("hide-monster-health-bars");
            if (!state.monsterStrengthVisible) overlayContainer.classList.add("hide-monster-strength");
            if (!state.respawnTimerVisible) overlayContainer.classList.add("hide-respawn-timer");
            if (!state.respawnIndicatorVisible) overlayContainer.classList.add("hide-respawn-indicator");
            if (!state.respawnTimerVisible && !state.respawnIndicatorVisible) overlayContainer.classList.add("hide-respawn-status");
            if (state.tabHidden) overlayContainer.classList.add("is-tab-hidden");
            if (overlayShouldBeVisible) overlayContainer.classList.add("is-visible");
            overlayHoverControls.classList.toggle("is-enabled", overlayShouldBeVisible && !state.tabHidden);

            levelNumber.textContent = state.level;
            mapValueNumber.textContent = formatCurrency(state.mapValue);
            let visibleUpgradeCount = 0;
            for (const upgrade of upgradeDefinitions) {
                const element = upgradeElements.get(upgrade.key);
                const value = Number(state[upgrade.key]) || 0;
                element.value.textContent = value;
                element.badge.classList.toggle("is-zero", value <= 0);
                if (value > 0) visibleUpgradeCount++;
            }
            upgradeRow.classList.toggle("is-empty", visibleUpgradeCount === 0);
            renderTimer(state);

            if (state.rosterPending) {
                ensureMonsterSquares(0);
            } else if (roster.length > 0) {
                roster.sort((left, right) => left.level - right.level || String(left.id).localeCompare(String(right.id)));
                const revealedBySource = new Map(
                    state.monsters
                        .filter((monster) => monster.sourceId != null)
                        .map((monster) => [String(monster.sourceId), monster])
                );
                ensureMonsterSquares(roster.length);
                roster.forEach((slot, index) => {
                    updateMonsterSquare(monstersSquares.children[index], slot.level, revealedBySource.get(String(slot.id)), state.strength, slot);
                });
            } else {
                const counts = OverlayApp.getCountsForLevel(state.level);
                const totalCount = counts.level1 + counts.level2 + counts.level3;
                ensureMonsterSquares(totalCount);

                let squareIndex = 0;
                for (let level = 1; level <= 3; level++) {
                    const selected = state.monsters.filter((monster) => monster.level === level);
                    for (let index = 0; index < counts[`level${level}`]; index++) {
                        updateMonsterSquare(monstersSquares.children[squareIndex], level, selected[index], state.strength);
                        squareIndex++;
                    }
                }
            }

            updateTopbarLayout({ keepInlineUntilUpgradesHidden, keepInlineUntilHeaderHidden });
            if (keepInlineUntilUpgradesHidden) {
                scheduleTopbarInlineCleanup((currentState) => !currentState.upgradesVisible);
            } else if (keepInlineUntilHeaderHidden) {
                scheduleTopbarInlineCleanup((currentState) => currentState.upgradesVisible && !currentState.levelBadgeVisible && !currentState.timerVisible);
            }
            applySavedPositionsWhenLayoutChanges(state);
            if (majorVisibilityChanged) scheduleLayoutReclamp();
        }

        applyViewportScale();
        window.addEventListener("resize", () => {
            applyViewportScale();
            updateTopbarLayout();
            lastPositionLayoutKey = "";
            applySavedPositions();
        });
        if (window.visualViewport) {
            window.visualViewport.addEventListener("resize", () => {
                applyViewportScale();
                updateTopbarLayout();
                lastPositionLayoutKey = "";
                applySavedPositions();
            });
        }
        overlayDragCorners.forEach((corner) => {
            corner.addEventListener("pointerdown", startOverlayDrag);
        });

        buildUpgradeRow();
        overlaySizeSlider.addEventListener("input", () => OverlayApp.setSquareSize(parseInt(overlaySizeSlider.value, 10)));
        overlayUpgradeSizeSlider.addEventListener("input", () => OverlayApp.setUpgradeSize(parseInt(overlayUpgradeSizeSlider.value, 10)));
        overlayColumnsSlider.addEventListener("input", () => OverlayApp.setColumnsCount(parseInt(overlayColumnsSlider.value, 10)));
        overlayHoverOpacitySlider.addEventListener("input", () => OverlayApp.setHoverOpacity(parseInt(overlayHoverOpacitySlider.value, 10)));
        overlayAlignmentButtons.forEach((button) => {
            button.addEventListener("click", () => OverlayApp.setOverlayAlignment(button.dataset.alignment));
        });
        overlayUpgradeLayoutButtons.forEach((button) => {
            button.addEventListener("click", () => OverlayApp.setUpgradeLayout(button.dataset.upgradeLayout));
        });
        overlayBgToggle.addEventListener("change", () => OverlayApp.setBgEnabled(overlayBgToggle.checked));
        overlayTimerToggle.addEventListener("change", () => OverlayApp.setTimerVisible(overlayTimerToggle.checked));
        overlayUpgradesToggle.addEventListener("change", () => OverlayApp.setUpgradesVisible(overlayUpgradesToggle.checked));
        overlayMonsterIconsToggle.addEventListener("change", () => OverlayApp.setMonsterIconsVisible(overlayMonsterIconsToggle.checked));
        overlayMapValueToggle.addEventListener("change", () => OverlayApp.setMapValueVisible(overlayMapValueToggle.checked));
        overlayLevelBadgeToggle.addEventListener("change", () => OverlayApp.setLevelBadgeVisible(overlayLevelBadgeToggle.checked));
        overlayUpgradeTooltipsToggle.addEventListener("change", () => OverlayApp.setUpgradeTooltipsVisible(overlayUpgradeTooltipsToggle.checked));
        overlayMonsterHealthBarsToggle.addEventListener("change", () => OverlayApp.setMonsterHealthBarsVisible(overlayMonsterHealthBarsToggle.checked));
        overlayMonsterStrengthToggle.addEventListener("change", () => OverlayApp.setMonsterStrengthVisible(overlayMonsterStrengthToggle.checked));
        overlayRespawnTimerToggle.addEventListener("change", () => OverlayApp.setRespawnTimerVisible(overlayRespawnTimerToggle.checked));
        overlayRespawnIndicatorToggle.addEventListener("change", () => OverlayApp.setRespawnIndicatorVisible(overlayRespawnIndicatorToggle.checked));
        overlayLanguageRuBtn.addEventListener("click", () => OverlayApp.setInterfaceLanguage("ru"));
        overlayLanguageEnBtn.addEventListener("click", () => OverlayApp.setInterfaceLanguage("en"));
        [overlaySizeSlider, overlayUpgradeSizeSlider, overlayColumnsSlider, overlayHoverOpacitySlider].forEach((slider) => {
            slider.addEventListener("pointerup", () => slider.blur());
            slider.addEventListener("change", () => slider.blur());
        });
        OverlayApp.subscribe(render);
        setInterval(() => {
            if (latestState && latestState.running && latestState.timerVisible) {
                renderTimer(latestState);
            }
        }, 1000);
        setInterval(() => {
            for (const square of monstersSquares.children) renderMonsterCooldown(square);
        }, 50);
    </script>
</body>
</html>
